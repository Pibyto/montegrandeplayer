<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KlauTV - Web</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
  <script src="https://www.gstatic.com/cvjs/sender/libs/cast_sender.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; min-height: 100vh; padding: 15px; overflow: hidden; }
    .toolbar { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 15px; max-width: 1400px; margin-left: auto; margin-right: auto; }
    .tool-btn { background: rgba(0,0,0,0.6); border: none; color: white; width: 44px; height: 44px; border-radius: 44px; font-size: 1.2rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .cast-btn { background-image: url('https://tinyurl.com/3sv2wy92'); background-size: 60%; background-repeat: no-repeat; background-position: center; }
    .watermark { position: fixed; top: 20px; left: 20px; width: 90px; height: auto; z-index: 1000; pointer-events: none; opacity: 0.9; }
    .app { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1400px; margin: 0 auto; height: calc(100vh - 100px); }
    .left-panel, .right-panel { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 20px; padding: 15px 12px; height: 100%; overflow-y: auto; }
    .left-panel { flex: 0 0 250px; }
    .right-panel { flex: 0 0 280px; }
    .center-panel { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 15px; height: 100%; }
    .player-container { background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 16 / 9; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; display: block; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    video::-webkit-media-controls { display: none !important; }
    .dynamic-area { display: none; width: 100%; height: 100%; flex-direction: column; gap: 10px; }
    .dynamic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 20px; height: 100%; overflow-y: auto; }
    .dynamic-grid.categorias-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .item-card { background: rgba(20,20,30,0.8); border-radius: 16px; overflow: hidden; cursor: pointer; text-align: center; transition: transform 0.1s; }
    .item-card.poster-card { padding-bottom: 8px; }
    .item-card.text-card { padding: 20px 10px; }
    .item-card.volver-card { background: #ff8800; color: #000; font-weight: bold; border: none; }
    .item-card.volver-card .item-title { color: #000; font-weight: bold; }
    .item-card:focus { background: rgba(60,60,60,0.8); transform: scale(1.02); }
    .item-poster { width: 100%; height: auto; display: block; background: #1a1a2a; }
    .item-title { font-size: 0.8rem; padding: 8px 6px; color: rgba(255,255,255,0.8); text-align: center; line-height: 1.3; }
    .fav-bar { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 40px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
    .fav-chip { background: rgba(255,255,255,0.1); padding: 5px 14px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .menu-list { display: flex; flex-direction: column; gap: 6px; }
    .menu-btn, .cat-btn, .channel-menu-btn { background: rgba(30,30,40,0.6); border: none; color: #ccc; font-size: 0.85rem; padding: 12px 12px; border-radius: 14px; text-align: left; cursor: pointer; width: 100%; }
    .back-btn { background: rgba(50,50,60,0.7); color: #ffdd99; margin-bottom: 10px; }
    .channel-item { display: flex; align-items: center; gap: 12px; background: rgba(25,25,35,0.5); margin-bottom: 8px; padding: 8px 10px; border-radius: 14px; cursor: pointer; }
    .channel-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; }
    .channel-name { flex: 1; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-star { background: none; border: none; color: #aaa; font-size: 1rem; cursor: pointer; width: 28px; }
    .fav-star.active { color: #ffcc88; }
    .reproducir-info { background: rgba(0,0,0,0.5); border-radius: 40px; padding: 8px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .reproducir-info span { font-size: 0.75rem; color: rgba(255,255,255,0.7); letter-spacing: 1px; }
    .reproducir-info img { width: 28px; height: 28px; object-fit: contain; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #ffcc88; border-radius: 10px; }
    .empty-msg { text-align: center; padding: 20px; opacity: 0.6; font-size: 0.8rem; }
    
    /* ========== MÓVIL: paneles visibles y reordenados correctamente ========== */
    @media (max-width: 800px) {
      body { padding: 10px; }
      .left-panel, .right-panel { 
        flex-basis: 100%; 
        width: 100%;
        height: auto; 
        max-height: 40vh;
        display: block !important;
      }
      .left-panel.oculto, .right-panel.oculto { 
        display: none !important; 
      }
      .watermark { width: 70px; top: 10px; left: 10px; }
      .tool-btn { width: 38px; height: 38px; font-size: 1rem; }
      .dynamic-grid.categorias-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .reproducir-info span { font-size: 0.65rem; }
      .reproducir-info img { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>

<img class="watermark" src="https://tinyurl.com/yrfarar9" alt="KlauTV">

<div class="toolbar">
  <button class="tool-btn" id="toggleLeftBtn">☰</button>
  <button class="tool-btn" id="toggleRightBtn">▶</button>
  <button class="tool-btn" id="fullscreenBtn">⛶</button>
  <button class="tool-btn cast-btn" id="castButton"></button>
</div>

<div class="app">
  <div class="left-panel" id="leftPanel">
    <div style="text-align:center; margin-bottom:15px;">
      <img src="https://cdn.phototourl.com/free/2026-04-21-4a8d26b0-4efb-4851-b8b9-016c8c390024.png" alt="KlauTV" style="width:70px; opacity:0.8;">
    </div>
    <div id="menuContainer" class="menu-list"></div>
  </div>
  <div class="center-panel">
    <div class="player-container" id="playerContainer">
      <video id="videoPlayer" autoplay playsinline poster="" crossorigin="anonymous"></video>
    </div>
    <div id="dynamicArea" class="dynamic-area">
      <div class="reproducir-info">
        <span>REPRODUCIR PELÍCULAS</span>
        <img src="https://cdn.iconscout.com/icon/free/png-256/free-reproductor-vlc-icon-svg-download-png-722651.png?f=webp" alt="VLC">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/MX_Player_Logo.png" alt="MXPlayer">
      </div>
      <div id="dynamicGrid" class="dynamic-grid"></div>
    </div>
    <div class="fav-bar" id="favBar"></div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
  // ========== CONFIGURACIÓN DE LOGOS ==========
  const logosCanales = [
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208744/tracks-v1a1/mono.m3u8", logo: "https://tinyurl.com/2uysrbe7", top: "20px", right: "50px", widthNormal: "100px", widthFullscreen: "180px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208138/tracks-v1a1/mono.m3u8", logo: "https://tinyurl.com/6tptw4t2", top: "20px", right: "40px", widthNormal: "120px", widthFullscreen: "150px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-209163/playlist.m3u8", logo: "https://tinyurl.com/48xkysmd", top: "20px", right: "40px", widthNormal: "120px", widthFullscreen: "150px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208817/playlist.m3u8", logo: "https://tinyurl.com/4m768mja", top: "20px", right: "40px", widthNormal: "120px", widthFullscreen: "150px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-209909/playlist.m3u8", logo: "https://tinyurl.com/89bw22fh", top: "20px", right: "40px", widthNormal: "120px", widthFullscreen: "150px" }
  ];

  window.addEventListener('error', (e) => {
    if (e.message && (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))) {
      e.preventDefault();
      return false;
    }
  });

  const TV_M3U_URL = "https://tinyurl.com/2n2etx65";
  const MOVIES_M3U_URL = "https://tinyurl.com/2vz6vphp";
  const SERIES_M3U_URL = "https://tinyurl.com/seriesmgtv";
  const KIDS_M3U_URL = "https://tinyurl.com/peliskids";
  
  let categoriasTV = {};
  let todosCanales = [];
  let favoritos = JSON.parse(localStorage.getItem("klautv_favs")) || [];
  let canalesActuales = [];
  let currentHls = null, currentMpegts = null;
  let leftVisible = true, rightVisible = true;
  let peliculasCategorias = {};
  let seriesCategorias = {};
  let kidsCategorias = {};
  let modoPeliculas = false;
  let currentPlayingUrl = null;
  let currentChannelIndex = 0;
  let logoActual = null;
  let tipoContenido = "peliculas"; // peliculas, series, kids
  let nivel = "categorias"; // categorias, items
  let categoriaActual = "";

  const menuContainer = document.getElementById("menuContainer");
  const rightPanel = document.getElementById("rightPanel");
  const leftPanel = document.getElementById("leftPanel");
  const video = document.getElementById("videoPlayer");
  const favBar = document.getElementById("favBar");
  const playerContainer = document.getElementById("playerContainer");
  const dynamicArea = document.getElementById("dynamicArea");
  const dynamicGrid = document.getElementById("dynamicGrid");
  const toggleLeftBtn = document.getElementById("toggleLeftBtn");
  const toggleRightBtn = document.getElementById("toggleRightBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const castButton = document.getElementById("castButton");

  function ajustarTamanoLogo() {
    if (!logoActual || !currentPlayingUrl) return;
    const config = logosCanales.find(c => c.url === currentPlayingUrl);
    if (config) {
      logoActual.style.width = document.fullscreenElement ? config.widthFullscreen : config.widthNormal;
    }
  }

  function mostrarLogo(canalUrl) {
    if (logoActual) { logoActual.remove(); logoActual = null; }
    const config = logosCanales.find(c => c.url === canalUrl);
    if (config) {
      const img = document.createElement('img');
      img.src = config.logo;
      img.style.cssText = `position:absolute; top:${config.top}; right:${config.right}; width:${config.widthNormal}; height:auto; z-index:99999; pointer-events:none;`;
      playerContainer.appendChild(img);
      logoActual = img;
      setTimeout(ajustarTamanoLogo, 100);
    }
  }

  document.addEventListener('fullscreenchange', ajustarTamanoLogo);

  // ========== REPRODUCCIÓN DE PELÍCULAS (VLC / MX) ==========
  function abrirEnVLC(url) {
    window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;package=org.videolan.vlc;scheme=vlc;end;`;
  }

  function abrirEnMXPlayer(url) {
    window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;package=com.mxtech.videoplayer.ad;scheme=https;end;`;
  }

  function intentarReproducirPelicula(url) {
    const timeout = setTimeout(() => {
      abrirEnMXPlayer(url);
    }, 1500);
    
    abrirEnVLC(url);
    
    window.addEventListener('blur', () => {
      clearTimeout(timeout);
    }, { once: true });
  }

  // ========== REPRODUCCIÓN DE CANALES DE TV ==========
  function playTv(url) {
    if (!url) return;
    currentPlayingUrl = url;
    
    mostrarLogo(url);
    
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    if (currentMpegts) { currentMpegts.destroy(); currentMpegts = null; }
    
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (url.includes(':25461/') || url.includes('.ts')) {
      if (window.mpegts && mpegts.isSupported()) {
        try {
          currentMpegts = mpegts.createPlayer({ type: 'mpegts', url: url, isLive: true });
          currentMpegts.attachMediaElement(video);
          currentMpegts.load();
          currentMpegts.play().catch(e => console.warn);
        } catch(e) {
          video.src = url;
          video.play().catch(e => console.warn);
        }
      } else {
        video.src = url;
        video.play().catch(e => console.warn);
      }
      return;
    }
    
    if (url.includes('.m3u8')) {
      if (Hls && Hls.isSupported()) {
        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.warn));
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play().catch(e=>console.warn);
      }
      return;
    }
    
    video.src = url;
    video.play().catch(e => console.warn);
  }

  function cambiarCanal(direccion) {
    if (todosCanales.length === 0) return;
    let nuevoIndex = currentChannelIndex + direccion;
    if (nuevoIndex < 0) nuevoIndex = todosCanales.length - 1;
    if (nuevoIndex >= todosCanales.length) nuevoIndex = 0;
    currentChannelIndex = nuevoIndex;
    playTv(todosCanales[currentChannelIndex].url);
  }

  // ========== FUNCIONES PARA PELÍCULAS, SERIES, KIDS ==========
  function saveFavs() { localStorage.setItem("klautv_favs", JSON.stringify(favoritos)); renderFavBar(); renderRightPanel(); }
  function toggleFav(canal, e) { e?.stopPropagation(); favoritos.some(f => f.url === canal.url) ? favoritos = favoritos.filter(f => f.url !== canal.url) : favoritos.push(canal); saveFavs(); }
  
  function renderFavBar() {
    favBar.innerHTML = "";
    if (favoritos.length === 0) return;
    favoritos.forEach(fav => {
      const chip = document.createElement("div");
      chip.className = "fav-chip";
      chip.setAttribute("tabindex", "0");
      chip.onclick = () => { playTv(fav.url); };
      chip.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') chip.click(); };
      if (fav.logo) { const img = document.createElement("img"); img.src = fav.logo; img.style.cssText = "width:20px; height:20px;"; chip.appendChild(img); }
      chip.appendChild(document.createTextNode(fav.nombre));
      favBar.appendChild(chip);
    });
  }

  function renderCategorias() {
    dynamicGrid.className = "dynamic-grid categorias-grid";
    dynamicGrid.innerHTML = "";
    
    let categorias = [];
    if (tipoContenido === "peliculas") categorias = Object.keys(peliculasCategorias).sort();
    else if (tipoContenido === "series") categorias = Object.keys(seriesCategorias).sort();
    else categorias = Object.keys(kidsCategorias).sort();
    
    const volverMenu = document.createElement("div");
    volverMenu.className = "item-card text-card volver-card";
    volverMenu.setAttribute("tabindex", "0");
    volverMenu.innerHTML = `<div class="item-title">← VOLVER</div>`;
    volverMenu.onclick = () => { salirModoPeliculas(); };
    volverMenu.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') volverMenu.click(); };
    dynamicGrid.appendChild(volverMenu);
    
    categorias.forEach(cat => {
      const card = document.createElement("div");
      card.className = "item-card text-card";
      card.setAttribute("tabindex", "0");
      card.innerHTML = `<div class="item-title">${cat}</div>`;
      card.onclick = () => { nivel = "items"; categoriaActual = cat; renderItems(); };
      card.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') card.click(); };
      dynamicGrid.appendChild(card);
    });
    setTimeout(() => dynamicGrid.querySelector(".item-card")?.focus(), 100);
  }
  
  function renderItems() {
    dynamicGrid.className = "dynamic-grid";
    dynamicGrid.innerHTML = "";
    
    const volverCard = document.createElement("div");
    volverCard.className = "item-card text-card volver-card";
    volverCard.setAttribute("tabindex", "0");
    volverCard.innerHTML = `<div class="item-title">← VOLVER A CATEGORÍAS</div>`;
    volverCard.onclick = () => { nivel = "categorias"; renderCategorias(); };
    volverCard.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') volverCard.click(); };
    dynamicGrid.appendChild(volverCard);
    
    let items = [];
    if (tipoContenido === "peliculas") items = peliculasCategorias[categoriaActual] || [];
    else if (tipoContenido === "series") items = seriesCategorias[categoriaActual] || [];
    else items = kidsCategorias[categoriaActual] || [];
    
    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "item-card poster-card";
      card.setAttribute("tabindex", "0");
      if (item.logo) {
        const poster = document.createElement("img");
        poster.className = "item-poster";
        poster.src = item.logo;
        poster.onerror = () => { poster.src = "https://placehold.co/300x450/1a1a2a/888?text=Sin+Poster"; };
        card.appendChild(poster);
      }
      const title = document.createElement("div");
      title.className = "item-title";
      title.innerText = item.nombre;
      card.appendChild(title);
      card.onclick = () => intentarReproducirPelicula(item.url);
      card.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') card.click(); };
      dynamicGrid.appendChild(card);
    });
    setTimeout(() => dynamicGrid.querySelector(".item-card")?.focus(), 100);
  }

  function salirModoPeliculas() {
    modoPeliculas = false;
    dynamicArea.style.display = "none";
    playerContainer.style.display = "block";
    leftPanel.classList.remove("oculto");
    rightPanel.classList.remove("oculto");
    leftVisible = true;
    rightVisible = true;
    nivel = "categorias";
    if (logoActual) { logoActual.remove(); logoActual = null; }
    renderPrincipal();
    if (todosCanales.length > 0) playTv(todosCanales[currentChannelIndex].url);
  }

  function entrarModo(tipo) {
    if (modoPeliculas) salirModoPeliculas();
    modoPeliculas = true;
    tipoContenido = tipo;
    nivel = "categorias";
    if (logoActual) { logoActual.remove(); logoActual = null; }
    playerContainer.style.display = "none";
    dynamicArea.style.display = "flex";
    leftPanel.classList.add("oculto");
    rightPanel.classList.add("oculto");
    leftVisible = false;
    rightVisible = false;
    renderCategorias();
  }

  function cargarPeliculas() {
    return fetch(MOVIES_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        peliculasCategorias = {};
        const lines = data.split("\n");
        let currentName = "", currentLogo = "", currentUrl = "", currentGroup = "Sin categoría";
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1].trim() : "Película";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Sin categoría";
          } else if (line.startsWith("http")) {
            currentUrl = line;
            if (currentName && currentUrl) {
              if (!peliculasCategorias[currentGroup]) peliculasCategorias[currentGroup] = [];
              peliculasCategorias[currentGroup].push({ nombre: currentName, url: currentUrl, logo: currentLogo !== "http://127.0.0.1/" ? currentLogo : null });
            }
            currentName = ""; currentLogo = ""; currentUrl = "";
          }
        }
      }).catch(e => console.error("Error pelis:", e));
  }

  function cargarSeries() {
    return fetch(SERIES_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        seriesCategorias = {};
        const lines = data.split("\n");
        let currentName = "", currentLogo = "", currentUrl = "", currentGroup = "Sin categoría";
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1].trim() : "Episodio";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Sin categoría";
          } else if (line.startsWith("http")) {
            currentUrl = line;
            if (currentName && currentUrl) {
              if (!seriesCategorias[currentGroup]) seriesCategorias[currentGroup] = [];
              seriesCategorias[currentGroup].push({ nombre: currentName, url: currentUrl, logo: currentLogo !== "http://127.0.0.1/" ? currentLogo : null });
            }
            currentName = ""; currentLogo = ""; currentUrl = "";
          }
        }
      }).catch(e => console.error("Error series:", e));
  }

  function cargarKids() {
    return fetch(KIDS_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        kidsCategorias = {};
        const lines = data.split("\n");
        let currentName = "", currentLogo = "", currentUrl = "", currentGroup = "Sin categoría";
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1].trim() : "Película";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Sin categoría";
          } else if (line.startsWith("http")) {
            currentUrl = line;
            if (currentName && currentUrl) {
              if (!kidsCategorias[currentGroup]) kidsCategorias[currentGroup] = [];
              kidsCategorias[currentGroup].push({ nombre: currentName, url: currentUrl, logo: currentLogo !== "http://127.0.0.1/" ? currentLogo : null });
            }
            currentName = ""; currentLogo = ""; currentUrl = "";
          }
        }
      }).catch(e => console.error("Error kids:", e));
  }

  function renderPrincipal() {
    menuContainer.innerHTML = "";
    ["TV", "PELICULAS", "SERIES", "KIDS"].forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.innerText = opt;
      btn.setAttribute("tabindex", "0");
      btn.onclick = () => {
        if (opt === "TV") {
          if (modoPeliculas) salirModoPeliculas();
          if (Object.keys(categoriasTV).length) renderCategoriasTV();
          else setTimeout(() => { if(Object.keys(categoriasTV).length) renderCategoriasTV(); }, 500);
        } else if (opt === "PELICULAS") entrarModo("peliculas");
        else if (opt === "SERIES") entrarModo("series");
        else if (opt === "KIDS") entrarModo("kids");
      };
      btn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') btn.click(); };
      menuContainer.appendChild(btn);
    });
  }

  function renderCategoriasTV() {
    const cats = Object.keys(categoriasTV).filter(c => c !== "Otros" && c.trim());
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "cat-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderPrincipal();
    backBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') backBtn.click(); };
    menuContainer.appendChild(backBtn);
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.innerText = cat;
      btn.setAttribute("tabindex", "0");
      btn.onclick = () => {
        canalesActuales = categoriasTV[cat] || [];
        renderCanalesEnMenu();
        if (canalesActuales.length) playTv(canalesActuales[0].url);
      };
      btn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') btn.click(); };
      menuContainer.appendChild(btn);
    });
  }

  function renderCanalesEnMenu() {
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "cat-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderCategoriasTV();
    backBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') backBtn.click(); };
    menuContainer.appendChild(backBtn);
    canalesActuales.forEach(canal => {
      const btn = document.createElement("button");
      btn.className = "channel-menu-btn";
      btn.setAttribute("tabindex", "0");
      if (canal.logo) {
        const img = document.createElement("img");
        img.src = canal.logo;
        img.style.cssText = "width:24px; height:24px; margin-right:8px; border-radius:4px;";
        btn.appendChild(img);
      }
      const span = document.createElement("span");
      span.innerText = canal.nombre;
      btn.appendChild(span);
      btn.onclick = () => playTv(canal.url);
      btn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') playTv(canal.url); };
      menuContainer.appendChild(btn);
    });
  }

  function renderRightPanel() {
    rightPanel.innerHTML = "";
    if (!todosCanales.length) { rightPanel.innerHTML = "<div class='empty-msg'>Cargando canales...</div>"; return; }
    todosCanales.forEach((canal, idx) => {
      const item = document.createElement("div");
      item.className = "channel-item";
      item.setAttribute("tabindex", "0");
      if (canal.logo) {
        const img = document.createElement("img");
        img.className = "channel-logo";
        img.src = canal.logo;
        img.onerror = () => img.style.display = "none";
        item.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.style.cssText = "width:32px; height:32px; background:#222; border-radius:6px;";
        item.appendChild(placeholder);
      }
      const nameSpan = document.createElement("span");
      nameSpan.className = "channel-name";
      nameSpan.innerText = canal.nombre;
      item.appendChild(nameSpan);
      const favBtn = document.createElement("button");
      favBtn.className = "fav-star";
      favBtn.innerText = favoritos.some(f => f.url === canal.url) ? "★" : "☆";
      if (favoritos.some(f => f.url === canal.url)) favBtn.classList.add("active");
      favBtn.setAttribute("tabindex", "0");
      favBtn.onclick = (e) => { e.stopPropagation(); toggleFav(canal, e); };
      favBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') { e.stopPropagation(); toggleFav(canal, e); } };
      item.appendChild(favBtn);
      item.onclick = () => { salirModoPeliculas(); playTv(canal.url); };
      item.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') item.click(); };
      rightPanel.appendChild(item);
    });
  }

  function cargarDatos() {
    const cargaTV = fetch(TV_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        categoriasTV = {}; todosCanales = [];
        const lines = data.split("\n");
        let currentName = "", currentGroup = "Otros", currentLogo = null;
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1] : "Canal";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Otros";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : null;
          } else if (line.startsWith("http")) {
            const canal = { nombre: currentName, url: line, logo: currentLogo };
            if (!categoriasTV[currentGroup]) categoriasTV[currentGroup] = [];
            categoriasTV[currentGroup].push(canal);
            todosCanales.push(canal);
          }
        }
        if (Object.keys(categoriasTV).length === 0) throw new Error();
        renderPrincipal(); renderFavBar(); renderRightPanel();
        const primeras = Object.keys(categoriasTV);
        if (primeras.length) {
          const primeraCat = primeras[0];
          canalesActuales = categoriasTV[primeraCat] || [];
          if (canalesActuales.length) {
            currentChannelIndex = 0;
            playTv(canalesActuales[0].url);
          }
        }
      })
      .catch(() => {
        categoriasTV = { "PRINCIPAL": [{ nombre: "Demo", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null }] };
        todosCanales = categoriasTV.PRINCIPAL;
        renderPrincipal(); renderFavBar(); renderRightPanel();
      });
    
    const cargaPelis = cargarPeliculas();
    const cargaSeries = cargarSeries();
    const cargaKids = cargarKids();
    
    Promise.all([cargaTV, cargaPelis, cargaSeries, cargaKids]).then(() => {
      console.log("ClauTV listo");
    });
  }
  
  cargarDatos();

  function toggleLeft() { 
    leftVisible = !leftVisible; 
    leftPanel.classList.toggle("oculto", !leftVisible); 
  }
  function toggleRight() { 
    rightVisible = !rightVisible; 
    rightPanel.classList.toggle("oculto", !rightVisible); 
  }
  toggleLeftBtn.onclick = toggleLeft;
  toggleRightBtn.onclick = toggleRight;
  
  function getFocusableLeft() {
    let items = [];
    if (leftVisible && !leftPanel.classList.contains("oculto")) {
      document.querySelectorAll("#leftPanel .menu-btn, #leftPanel .cat-btn, #leftPanel .channel-menu-btn, #leftPanel .back-btn").forEach(el => items.push(el));
    }
    return items;
  }

  function getFocusableRight() {
    let items = [];
    if (rightVisible && !rightPanel.classList.contains("oculto")) {
      document.querySelectorAll("#rightPanel .channel-item").forEach(el => items.push(el));
    }
    return items;
  }

  function getFocusableDynamic() {
    return [...document.querySelectorAll("#dynamicGrid .item-card")];
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
      else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
    } else { document.exitFullscreen(); }
  }
  fullscreenBtn.onclick = toggleFullscreen;

  let isFullscreen = false;
  let doubleClickTimer = null;
  document.addEventListener("fullscreenchange", () => { isFullscreen = !!document.fullscreenElement; });

  document.addEventListener("keydown", (e) => {
    const key = e.key;
    
    if (modoPeliculas) {
      if (key === "Backspace" || key === "Escape") {
        e.preventDefault();
        if (nivel === "items") {
          nivel = "categorias";
          renderCategorias();
        } else {
          salirModoPeliculas();
        }
        return;
      }
      if (key === "ArrowLeft" || key === "ArrowRight" || key === "ArrowUp" || key === "ArrowDown") {
        e.preventDefault();
        let items = getFocusableDynamic();
        if (items.length === 0) return;
        let current = document.activeElement;
        let idx = items.indexOf(current);
        if (key === "ArrowLeft") { if (idx > 0) items[idx-1]?.focus(); }
        else if (key === "ArrowRight") { if (idx < items.length-1) items[idx+1]?.focus(); }
        else if (key === "ArrowUp") {
          let cols = Math.floor(dynamicGrid.clientWidth / 150) || 4;
          let newIdx = idx - cols;
          if (newIdx >= 0) items[newIdx]?.focus();
        } else if (key === "ArrowDown") {
          let cols = Math.floor(dynamicGrid.clientWidth / 150) || 4;
          let newIdx = idx + cols;
          if (newIdx < items.length) items[newIdx]?.focus();
        }
        return;
      }
      if (key === "Enter") {
        let active = document.activeElement;
        if (active && active.click) active.click();
      }
      return;
    }
    
    if (!modoPeliculas) {
      if (isFullscreen && (key === "ArrowUp" || key === "ArrowDown")) {
        e.preventDefault();
        if (key === "ArrowUp") cambiarCanal(-1);
        else cambiarCanal(1);
        return;
      }
      if (key === "Enter") {
        if (doubleClickTimer === null) {
          doubleClickTimer = setTimeout(() => {
            doubleClickTimer = null;
            let active = document.activeElement;
            if (active && active.click) active.click();
          }, 250);
        } else {
          clearTimeout(doubleClickTimer);
          doubleClickTimer = null;
          e.preventDefault();
          toggleFullscreen();
        }
        return;
      }
      if (key === "ArrowLeft") {
        e.preventDefault();
        leftVisible = !leftVisible;
        leftPanel.classList.toggle("oculto", !leftVisible);
        if (leftVisible) setTimeout(() => getFocusableLeft()[0]?.focus(), 50);
        return;
      }
      if (key === "ArrowRight") {
        e.preventDefault();
        rightVisible = !rightVisible;
        rightPanel.classList.toggle("oculto", !rightVisible);
        if (rightVisible) setTimeout(() => getFocusableRight()[0]?.focus(), 50);
        return;
      }
      if (leftVisible && !leftPanel.classList.contains("oculto")) {
        let items = getFocusableLeft();
        let current = document.activeElement;
        let idx = items.indexOf(current);
        if (key === "ArrowUp") { e.preventDefault(); if (idx > 0) items[idx-1]?.focus(); }
        else if (key === "ArrowDown") { e.preventDefault(); if (idx < items.length-1) items[idx+1]?.focus(); }
        return;
      }
      if (rightVisible && !rightPanel.classList.contains("oculto")) {
        let items = getFocusableRight();
        let current = document.activeElement;
        let idx = items.indexOf(current);
        if (key === "ArrowUp") { e.preventDefault(); if (idx > 0) items[idx-1]?.focus(); }
        else if (key === "ArrowDown") { e.preventDefault(); if (idx < items.length-1) items[idx+1]?.focus(); }
        return;
      }
    }
  });

  let castContext = null;
  window['__onGCastApiAvailable'] = (loaded) => {
    if (loaded && chrome.cast && chrome.cast.isAvailable) {
      try {
        castContext = cast.framework.CastContext.getInstance();
        castContext.setOptions({ receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID, autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED });
      } catch(e) {}
    }
  };
  castButton.onclick = () => { if(castContext) castContext.requestSession(); };
</script>
</body>
