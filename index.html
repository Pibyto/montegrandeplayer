<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KlauTV - Web</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
  <script src="https://www.gstatic.com/cvjs/sender/libs/cast_sender.js"></script>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KlauTV">
  <link rel="apple-touch-icon" href="https://tinyurl.com/yrfarar9">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; min-height: 100vh; padding: 15px; }
    .toolbar { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 15px; max-width: 1400px; margin-left: auto; margin-right: auto; }
    .tool-btn { background: rgba(0,0,0,0.6); border: none; color: white; width: 44px; height: 44px; border-radius: 44px; font-size: 1.2rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .download-btn { background-image: url('https://tinyurl.com/4jkaxshw'); background-size: 60%; background-repeat: no-repeat; background-position: center; }
    .cast-btn { background-image: url('https://tinyurl.com/3sv2wy92'); background-size: 60%; background-repeat: no-repeat; background-position: center; }
    .watermark { position: fixed; top: 20px; left: 20px; width: 90px; height: auto; z-index: 1000; pointer-events: none; opacity: 0.9; }
    .app { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1400px; margin: 0 auto; }
    .left-panel, .right-panel { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 20px; padding: 15px 12px; height: calc(100vh - 100px); overflow-y: auto; }
    .left-panel { flex: 0 0 250px; }
    .right-panel { flex: 0 0 280px; }
    .center-panel { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 15px; }
    .player-container { background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 16 / 9; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; display: none; }
    .player-container.visible { display: block; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    video::-webkit-media-controls { display: none !important; }
    #black-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10; pointer-events: none; display: none; }
    .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 20px; max-height: calc(100vh - 100px); overflow-y: auto; }
    .movie-card { background: rgba(20,20,30,0.8); border-radius: 16px; overflow: hidden; cursor: pointer; text-align: center; padding-bottom: 8px; }
    .movie-poster { width: 100%; height: auto; display: block; background: #1a1a2a; }
    .movie-title { font-size: 0.7rem; padding: 6px 4px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-bar { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 40px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
    .fav-chip { background: rgba(255,255,255,0.1); padding: 5px 14px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .menu-list { display: flex; flex-direction: column; gap: 6px; }
    .menu-btn, .cat-btn, .channel-menu-btn { background: rgba(30,30,40,0.6); border: none; color: #ccc; font-size: 0.85rem; padding: 12px 12px; border-radius: 14px; text-align: left; cursor: pointer; width: 100%; }
    .back-btn { background: rgba(50,50,60,0.7); color: #ffdd99; margin-bottom: 10px; }
    .channel-item { display: flex; align-items: center; gap: 12px; background: rgba(25,25,35,0.5); margin-bottom: 8px; padding: 8px 10px; border-radius: 14px; cursor: pointer; }
    .channel-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; }
    .channel-name { flex: 1; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-star { background: none; border: none; color: #aaa; font-size: 1rem; cursor: pointer; width: 28px; }
    .fav-star.active { color: #ffcc88; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #ffcc88; border-radius: 10px; }
    .empty-msg { text-align: center; padding: 20px; opacity: 0.6; font-size: 0.8rem; }
    
    .reproducir-info {
      background: rgba(0,0,0,0.5);
      border-radius: 40px;
      padding: 8px 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .reproducir-info span {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      letter-spacing: 1px;
    }
    .reproducir-info img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }
    
    @media (max-width: 800px) {
      body { padding: 10px; }
      .left-panel, .right-panel { flex-basis: 100%; height: auto; max-height: 40vh; }
      .watermark { width: 70px; top: 10px; left: 10px; }
      .tool-btn { width: 38px; height: 38px; font-size: 1rem; }
      .movies-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
      .reproducir-info span { font-size: 0.65rem; }
      .reproducir-info img { width: 22px; height: 22px; }
    }
  </style>
</head>
<body>

<img class="watermark" src="https://tinyurl.com/yrfarar9" alt="KlauTV">

<div class="toolbar">
  <button class="tool-btn" id="toggleLeftBtn">☰</button>
  <button class="tool-btn" id="toggleRightBtn">▶</button>
  <button class="tool-btn" id="fullscreenBtn">⛶</button>
  <button class="tool-btn cast-btn" id="castButton"></button>
  <button class="tool-btn download-btn" id="installPwaBtn" style="background:#ffcc88; background-image:none; color:#000; font-weight:bold; font-size:0.75rem; width:auto; padding:0 16px;">📲 INSTALAR</button>
</div>

<div class="app">
  <div class="left-panel" id="leftPanel">
    <div style="text-align:center; margin-bottom:15px;">
      <img src="https://cdn.phototourl.com/free/2026-04-21-4a8d26b0-4efb-4851-b8b9-016c8c390024.png" alt="KlauTV" style="width:70px; opacity:0.8;">
    </div>
    <div id="menuContainer" class="menu-list"></div>
  </div>
  <div class="center-panel">
    <div class="player-container" id="playerContainer">
      <video id="videoPlayer" autoplay playsinline poster="" crossorigin="anonymous"></video>
      <div id="blackOverlay" style="position:absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index:10; pointer-events:none; display:none;"></div>
    </div>
    <div id="moviesArea" style="display: none;">
      <div class="reproducir-info">
        <span>REPRODUCIR PELÍCULAS</span>
        <img src="https://cdn.iconscout.com/icon/free/png-256/free-reproductor-vlc-icon-svg-download-png-722651.png?f=webp" alt="VLC">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/MX_Player_Logo.png" alt="MXPlayer">
      </div>
      <div id="moviesGridContainer" class="movies-grid"></div>
    </div>
    <div class="fav-bar" id="favBar"></div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
  const TV_M3U_URL = "https://tinyurl.com/2n2etx65";
  const MOVIES_M3U_URL = "https://tinyurl.com/2vz6vphp";
  
  let categorias = {};
  let todosCanales = [];
  let favoritos = JSON.parse(localStorage.getItem("klautv_favs")) || [];
  let nivel = "principal";
  let canalesActuales = [];
  let currentHls = null, currentMpegts = null;
  let leftVisible = true, rightVisible = true;
  let peliculasList = [];
  let modoPeliculas = false;
  let currentPlayingUrl = null;

  const menuContainer = document.getElementById("menuContainer");
  const rightPanel = document.getElementById("rightPanel");
  const leftPanel = document.getElementById("leftPanel");
  const video = document.getElementById("videoPlayer");
  const favBar = document.getElementById("favBar");
  const playerContainer = document.getElementById("playerContainer");
  const moviesArea = document.getElementById("moviesArea");
  const moviesGridContainer = document.getElementById("moviesGridContainer");
  const blackOverlay = document.getElementById("blackOverlay");
  const toggleLeftBtn = document.getElementById("toggleLeftBtn");
  const toggleRightBtn = document.getElementById("toggleRightBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const castButton = document.getElementById("castButton");
  const installPwaBtn = document.getElementById("installPwaBtn");

  // ========== LOGO MALVINAS TV (RECUPERADO) ==========
  function ajustarTamañoLogoMalvinas() {
    const logo = document.getElementById('logoMalvinas');
    if (!logo) return;
    if (document.fullscreenElement) {
      logo.style.width = '100px';
    } else {
      logo.style.width = '40px';
    }
  }

  function mostrarLogoMalvinas(url) {
    const logoExistente = document.getElementById('logoMalvinas');
    const esMalvinas = url === "https://live20.bozztv.com/giatvplayout7/giatv-208744/tracks-v1a1/mono.m3u8";
    
    if (logoExistente && !esMalvinas) {
      logoExistente.remove();
      return;
    }
    
    if (esMalvinas && !logoExistente) {
      const img = document.createElement('img');
      img.id = 'logoMalvinas';
      img.src = 'https://tinyurl.com/mvy7vk8a';
      img.style.position = 'absolute';
      img.style.top = '10px';
      img.style.right = '30px';
      img.style.width = '80px';
      img.style.height = 'auto';
      img.style.zIndex = '99999';
      img.style.pointerEvents = 'none';
      playerContainer.appendChild(img);
      setTimeout(ajustarTamañoLogoMalvinas, 100);
    }
  }

  document.addEventListener('fullscreenchange', () => {
    ajustarTamañoLogoMalvinas();
  });

  function showBlackOverlay() { if (blackOverlay) blackOverlay.style.display = "block"; }
  function hideBlackOverlay() { if (blackOverlay) blackOverlay.style.display = "none"; }
  
  video.addEventListener('playing', hideBlackOverlay);
  video.addEventListener('waiting', showBlackOverlay);

  function abrirEnVLC(url) {
    window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;package=org.videolan.vlc;scheme=vlc;end;`;
  }

  function abrirEnMXPlayer(url) {
    window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;package=com.mxtech.videoplayer.ad;scheme=https;end;`;
  }

  function playTv(url) {
    if (!url) return;
    currentPlayingUrl = url;
    
    mostrarLogoMalvinas(url);
    
    showBlackOverlay();
    setTimeout(hideBlackOverlay, 2000);
    
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    if (currentMpegts) { currentMpegts.destroy(); currentMpegts = null; }
    
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (url.includes(':25461/') || url.includes('.ts')) {
      if (window.mpegts && mpegts.isSupported()) {
        try {
          currentMpegts = mpegts.createPlayer({ type: 'mpegts', url: url, isLive: true });
          currentMpegts.attachMediaElement(video);
          currentMpegts.load();
          currentMpegts.play().catch(e => console.warn);
        } catch(e) {
          video.src = url;
          video.play().catch(e => console.warn);
        }
      } else {
        video.src = url;
        video.play().catch(e => console.warn);
      }
      return;
    }
    
    if (url.includes('.m3u8')) {
      if (Hls && Hls.isSupported()) {
        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.warn));
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play().catch(e=>console.warn);
      }
      return;
    }
    
    video.src = url;
    video.play().catch(e => console.warn);
  }

  // ========== PWA INSTALL ==========
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installPwaBtn.style.display = 'inline-flex';
  });
  installPwaBtn.onclick = () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    } else {
      alert("Para instalar la app, usa el navegador Chrome, Edge o Samsung Internet");
    }
  };

  function saveFavs() {
    localStorage.setItem("klautv_favs", JSON.stringify(favoritos));
    renderFavBar();
    renderRightPanel();
  }
  
  function toggleFav(canal, e) {
    if(e) e.stopPropagation();
    const exists = favoritos.some(f => f.url === canal.url);
    if (exists) favoritos = favoritos.filter(f => f.url !== canal.url);
    else favoritos.push(canal);
    saveFavs();
  }
  
  function renderFavBar() {
    favBar.innerHTML = "";
    if (favoritos.length === 0) {
      favBar.innerHTML = "<span style='opacity:0.6; font-size:0.7rem;'>⭐ Favoritos vacíos</span>";
      return;
    }
    favoritos.forEach(fav => {
      const chip = document.createElement("div");
      chip.className = "fav-chip";
      chip.setAttribute("tabindex", "0");
      chip.onclick = () => {
        if (modoPeliculas) salirModoPeliculas();
        playTv(fav.url);
      };
      chip.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') chip.click(); };
      if (fav.logo) {
        const img = document.createElement("img");
        img.src = fav.logo;
        img.style.width = "20px";
        img.style.height = "20px";
        chip.appendChild(img);
      } else {
        chip.innerHTML += "⭐ ";
      }
      chip.appendChild(document.createTextNode(fav.nombre));
      favBar.appendChild(chip);
    });
  }

  function entrarModoPeliculas() {
    modoPeliculas = true;
    const logo = document.getElementById('logoMalvinas');
    if (logo) logo.remove();
    playerContainer.classList.remove("visible");
    playerContainer.style.display = "none";
    moviesArea.style.display = "block";
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    if (currentMpegts) { currentMpegts.destroy(); currentMpegts = null; }
    video.pause();
    video.removeAttribute('src');
    renderMoviesGrid();
  }
  
  function salirModoPeliculas() {
    modoPeliculas = false;
    moviesArea.style.display = "none";
    playerContainer.style.display = "block";
    playerContainer.classList.add("visible");
  }
  
  function renderMoviesGrid() {
    moviesGridContainer.innerHTML = "";
    if (peliculasList.length === 0) {
      moviesGridContainer.innerHTML = "<div style='text-align:center;padding:40px;'>🎬 Cargando películas...</div>";
      return;
    }
    peliculasList.forEach(peli => {
      const card = document.createElement("div");
      card.className = "movie-card";
      card.setAttribute("tabindex", "0");
      card.onclick = () => {
        if(peli.url) abrirEnVLC(peli.url);
      };
      card.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') card.click(); };
      const poster = document.createElement("img");
      poster.className = "movie-poster";
      poster.src = peli.logo && peli.logo !== "http://127.0.0.1/" ? peli.logo : "https://placehold.co/300x450/1a1a2a/888?text=Sin+Poster";
      poster.onerror = () => { poster.src = "https://placehold.co/300x450/1a1a2a/888?text=Sin+Poster"; };
      const title = document.createElement("div");
      title.className = "movie-title";
      title.innerText = peli.nombre;
      card.appendChild(poster);
      card.appendChild(title);
      moviesGridContainer.appendChild(card);
    });
  }
  
  function cargarPeliculas() {
    fetch(MOVIES_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        const nuevasPelis = [];
        const lines = data.split("\n");
        let currentName = "", currentLogo = "", currentUrl = "";
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1].trim() : "Película";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
          } else if (line.startsWith("http")) {
            currentUrl = line;
            if (currentName && currentUrl) {
              nuevasPelis.push({ nombre: currentName, url: currentUrl, logo: currentLogo !== "http://127.0.0.1/" ? currentLogo : null });
            }
            currentName = ""; currentLogo = ""; currentUrl = "";
          }
        }
        if (nuevasPelis.length) peliculasList = nuevasPelis;
        if (modoPeliculas) renderMoviesGrid();
      }).catch(e => console.error("Error pelis:", e));
  }

  function renderPrincipal() {
    nivel = "principal";
    menuContainer.innerHTML = "";
    const opciones = ["TV", "PELÍCULAS", "SERIES", "KIDS"];
    opciones.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.innerText = opt;
      btn.setAttribute("tabindex", "0");
      btn.onclick = () => {
        if (opt === "TV") {
          salirModoPeliculas();
          if (Object.keys(categorias).length) renderCategorias();
          else setTimeout(() => { if(Object.keys(categorias).length) renderCategorias(); }, 500);
        } else if (opt === "PELÍCULAS") {
          entrarModoPeliculas();
          renderMenuPeliculasBack();
        } else {
          salirModoPeliculas();
        }
      };
      btn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') btn.click(); };
      menuContainer.appendChild(btn);
    });
  }
  
  function renderMenuPeliculasBack() {
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "menu-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.setAttribute("tabindex", "0");
    backBtn.onclick = () => { salirModoPeliculas(); renderPrincipal(); };
    backBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') backBtn.click(); };
    menuContainer.appendChild(backBtn);
  }

  function renderCategorias() {
    nivel = "categorias";
    const cats = Object.keys(categorias).filter(c => c !== "Otros" && c.trim());
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "menu-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.setAttribute("tabindex", "0");
    backBtn.onclick = () => renderPrincipal();
    backBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') backBtn.click(); };
    menuContainer.appendChild(backBtn);
    if (!cats.length) { menuContainer.innerHTML += "<div class='empty-msg'>No hay categorías</div>"; return; }
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.innerText = cat;
      btn.setAttribute("tabindex", "0");
      btn.onclick = () => {
        canalesActuales = categorias[cat] || [];
        nivel = "canales";
        renderCanalesEnMenu();
        if (canalesActuales.length) playTv(canalesActuales[0].url);
      };
      btn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') btn.click(); };
      menuContainer.appendChild(btn);
    });
  }

  function renderCanalesEnMenu() {
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "menu-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.setAttribute("tabindex", "0");
    backBtn.onclick = () => renderCategorias();
    backBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') backBtn.click(); };
    menuContainer.appendChild(backBtn);
    canalesActuales.forEach(canal => {
      const btn = document.createElement("button");
      btn.className = "channel-menu-btn";
      btn.setAttribute("tabindex", "0");
      if (canal.logo) {
        const img = document.createElement("img");
        img.src = canal.logo;
        img.style.width = "24px";
        img.style.height = "24px";
        img.style.marginRight = "8px";
        btn.appendChild(img);
      }
      const span = document.createElement("span");
      span.innerText = canal.nombre;
      btn.appendChild(span);
      btn.onclick = () => playTv(canal.url);
      btn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') playTv(canal.url); };
      menuContainer.appendChild(btn);
    });
  }

  function renderRightPanel() {
    rightPanel.innerHTML = "";
    if (!todosCanales.length) { rightPanel.innerHTML = "<div class='empty-msg'>Cargando canales...</div>"; return; }
    todosCanales.forEach(canal => {
      const item = document.createElement("div");
      item.className = "channel-item";
      item.setAttribute("tabindex", "0");
      if (canal.logo) {
        const img = document.createElement("img");
        img.className = "channel-logo";
        img.src = canal.logo;
        img.onerror = () => img.style.display = "none";
        item.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.style.width = "32px";
        placeholder.style.height = "32px";
        placeholder.style.background = "#222";
        placeholder.style.borderRadius = "6px";
        item.appendChild(placeholder);
      }
      const nameSpan = document.createElement("span");
      nameSpan.className = "channel-name";
      nameSpan.innerText = canal.nombre;
      item.appendChild(nameSpan);
      const favBtn = document.createElement("button");
      favBtn.className = "fav-star";
      favBtn.innerText = favoritos.some(f => f.url === canal.url) ? "★" : "☆";
      if (favoritos.some(f => f.url === canal.url)) favBtn.classList.add("active");
      favBtn.setAttribute("tabindex", "0");
      favBtn.onclick = (e) => { e.stopPropagation(); toggleFav(canal, e); };
      favBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') { e.stopPropagation(); toggleFav(canal, e); } };
      item.appendChild(favBtn);
      item.onclick = () => { if (modoPeliculas) salirModoPeliculas(); playTv(canal.url); };
      item.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') item.click(); };
      rightPanel.appendChild(item);
    });
  }

  function cargarListaTV() {
    fetch(TV_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        categorias = {}; todosCanales = [];
        const lines = data.split("\n");
        let currentName = "", currentGroup = "Otros", currentLogo = null;
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1] : "Canal";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Otros";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : null;
          } else if (line.startsWith("http")) {
            const canal = { nombre: currentName, url: line, logo: currentLogo };
            if (!categorias[currentGroup]) categorias[currentGroup] = [];
            categorias[currentGroup].push(canal);
            todosCanales.push(canal);
          }
        }
        if (Object.keys(categorias).length === 0) throw new Error();
        renderPrincipal(); renderFavBar(); renderRightPanel();
        const primeras = Object.keys(categorias);
        if (primeras.length) {
          const primeraCat = primeras[0];
          canalesActuales = categorias[primeraCat] || [];
          if (canalesActuales.length) playTv(canalesActuales[0].url);
        }
      }).catch(() => {
        categorias = { "PRINCIPAL": [{ nombre: "Demo", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null }] };
        todosCanales = categorias.PRINCIPAL;
        renderPrincipal(); renderFavBar(); renderRightPanel();
      });
  }

  function toggleLeft() { leftVisible = !leftVisible; leftPanel.style.display = leftVisible ? "block" : "none"; }
  function toggleRight() { rightVisible = !rightVisible; rightPanel.style.display = rightVisible ? "block" : "none"; }
  toggleLeftBtn.onclick = toggleLeft;
  toggleRightBtn.onclick = toggleRight;
  [toggleLeftBtn, toggleRightBtn, fullscreenBtn, castButton, installPwaBtn].forEach(btn => {
    if (btn) {
      btn.setAttribute("tabindex", "0");
      btn.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') btn.click(); };
    }
  });

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
      else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
    } else { document.exitFullscreen(); }
  }
  fullscreenBtn.onclick = toggleFullscreen;

  function getFocusableElements() {
    let elements = [];
    if (leftVisible && leftPanel.style.display !== "none") {
      document.querySelectorAll(".menu-btn, .cat-btn, .channel-menu-btn, .back-btn").forEach(el => elements.push(el));
    }
    if (rightVisible && rightPanel.style.display !== "none") {
      document.querySelectorAll(".channel-item").forEach(el => elements.push(el));
    }
    document.querySelectorAll(".fav-chip, .movie-card").forEach(el => elements.push(el));
    return elements;
  }

  document.addEventListener("keydown", (e) => {
    const key = e.key;
    if (key === "ArrowUp") {
      e.preventDefault();
      const items = getFocusableElements();
      if (items.length === 0) return;
      let current = document.activeElement;
      let idx = items.indexOf(current);
      if (idx <= 0) idx = items.length;
      items[idx - 1]?.focus();
    } else if (key === "ArrowDown") {
      e.preventDefault();
      const items = getFocusableElements();
      if (items.length === 0) return;
      let current = document.activeElement;
      let idx = items.indexOf(current);
      if (idx === -1 || idx === items.length - 1) idx = -1;
      items[idx + 1]?.focus();
    } else if (key === "Enter") {
      const active = document.activeElement;
      if (active && active.click) active.click();
    }
  });

  let castContext = null;
  window['__onGCastApiAvailable'] = (loaded) => {
    if (loaded && chrome.cast && chrome.cast.isAvailable) {
      try {
        castContext = cast.framework.CastContext.getInstance();
        castContext.setOptions({ receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID, autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED });
      } catch(e) {}
    }
  };
  if (castButton) castButton.onclick = () => { if(castContext) castContext.requestSession(); };

  cargarListaTV();
  cargarPeliculas();

  // Service Worker para PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.log("SW error:", e));
  }
</script>
