<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KlauTV - Web + Chromecast Real</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
  <!-- Google Cast SDK (necesita HTTPS para funcionar) -->
  <script src="https://www.gstatic.com/cvjs/sender/libs/cast_sender.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
      min-height: 100vh;
      padding: 15px;
    }
    /* Barra de herramientas */
    .toolbar {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 15px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    .tool-btn {
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 44px;
      font-size: 1.2rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
    }
    .tool-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .download-btn {
      background-image: url('https://tinyurl.com/4jkaxshw');
      background-size: 60%;
      background-repeat: no-repeat;
      background-position: center;
    }
    .cast-btn {
      background-image: url('https://tinyurl.com/3sv2wy92');
      background-size: 60%;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* Logo grande y visible */
    .watermark {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 120px;
      height: auto;
      z-index: 1000;
      pointer-events: none;
      opacity: 0.9;
    }

    /* Contenedor principal de tres columnas */
    .app {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .left-panel, .right-panel {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 15px 10px;
      height: calc(100vh - 100px);
      overflow-y: auto;
    }
    .left-panel { flex: 0 0 240px; }
    .right-panel { flex: 0 0 280px; }
    .center-panel {
      flex: 1;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .player-container {
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      width: 100%;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    video::-webkit-media-controls { display: none !important; }

    .fav-bar {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      padding: 8px 12px;
      border-radius: 40px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      white-space: nowrap;
    }
    .fav-chip {
      background: rgba(255,255,255,0.1);
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .fav-chip:hover {
      background: rgba(255,255,255,0.2);
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .menu-btn, .cat-btn, .channel-menu-btn {
      background: rgba(30,30,40,0.6);
      border: none;
      color: #ccc;
      font-size: 0.85rem;
      padding: 10px 12px;
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
      width: 100%;
    }
    .menu-btn:hover, .cat-btn:hover, .channel-menu-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #ffdd99;
    }
    .back-btn {
      background: rgba(50,50,60,0.7);
      color: #ffdd99;
      margin-bottom: 10px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(25,25,35,0.5);
      margin-bottom: 6px;
      padding: 8px 10px;
      border-radius: 14px;
      cursor: pointer;
    }
    .channel-item:hover {
      background: rgba(255,255,255,0.1);
    }
    .channel-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 6px;
    }
    .channel-name {
      flex: 1;
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fav-star {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1rem;
      cursor: pointer;
      width: 28px;
    }
    .fav-star.active { color: #ffcc88; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #ffcc88; border-radius: 10px; }
    .empty-msg { text-align: center; padding: 20px; opacity: 0.6; font-size: 0.8rem; }

    /* Pantalla completa solo en el reproductor */
    .player-container.fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      border-radius: 0;
      background: #000;
    }
    .player-container.fullscreen video {
      object-fit: contain;
    }

    @media (max-width: 800px) {
      body { padding: 10px; }
      .left-panel, .right-panel { flex-basis: 100%; height: auto; max-height: 40vh; }
      .watermark { width: 80px; top: 10px; left: 10px; }
      .tool-btn { width: 38px; height: 38px; font-size: 1rem; }
    }
  </style>
</head>
<body>

<!-- Logo grande (120px) -->
<img class="watermark" src="https://tinyurl.com/yrfarar9" alt="KlauTV">

<div class="toolbar">
  <button class="tool-btn" id="toggleLeftBtn" title="Mostrar/ocultar categorías">☰</button>
  <button class="tool-btn" id="toggleRightBtn" title="Mostrar/ocultar canales">▶</button>
  <button class="tool-btn" id="fullscreenBtn" title="Pantalla completa">⛶</button>
  <button class="tool-btn cast-btn" id="castButton" title="Enviar a Chromecast"></button>
  <button class="tool-btn download-btn" id="downloadAppBtn" title="Descargar aplicación"></button>
</div>

<div class="app">
  <div class="left-panel" id="leftPanel">
    <div style="text-align:center; margin-bottom:15px;">
      <img src="https://cdn.phototourl.com/free/2026-04-21-4a8d26b0-4efb-4851-b8b9-016c8c390024.png" alt="KlauTV" style="width:70px; opacity:0.8;">
    </div>
    <div id="menuContainer" class="menu-list"></div>
  </div>
  <div class="center-panel">
    <div class="player-container" id="playerContainer">
      <video id="videoPlayer" autoplay playsinline poster=""></video>
    </div>
    <div class="fav-bar" id="favBar"></div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
  // ==================== CONFIGURACIÓN ====================
  const M3U_URL = "https://tinyurl.com/2n2etx65";
  let categorias = {};
  let todosCanales = [];
  let favoritos = JSON.parse(localStorage.getItem("klautv_favs")) || [];
  let nivel = "principal";
  let canalesActuales = [];
  let currentHls = null, currentMpegts = null;
  let leftVisible = true, rightVisible = true;
  let castSession = null;
  let castInitialized = false;

  // DOM
  const menuContainer = document.getElementById("menuContainer");
  const rightPanel = document.getElementById("rightPanel");
  const leftPanel = document.getElementById("leftPanel");
  const video = document.getElementById("videoPlayer");
  const favBar = document.getElementById("favBar");
  const playerContainer = document.getElementById("playerContainer");
  const toggleLeftBtn = document.getElementById("toggleLeftBtn");
  const toggleRightBtn = document.getElementById("toggleRightBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const castButton = document.getElementById("castButton");
  const downloadBtn = document.getElementById("downloadAppBtn");

  // ========== DESCARGA ==========
  downloadBtn.addEventListener('click', () => {
    const htmlContent = document.documentElement.outerHTML;
    const blob = new Blob([htmlContent], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'KlauTV.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  // ========== REPRODUCCIÓN ==========
  function destroyPlayers() {
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    if (currentMpegts) { currentMpegts.destroy(); currentMpegts = null; }
  }

  function playUrl(url) {
    destroyPlayers();
    video.pause();
    video.style.background = "#000";
    // Xtream Codes y TS
    if (url.includes(':25461/') || url.includes('.ts')) {
      if (window.mpegts && mpegts.isSupported()) {
        try {
          currentMpegts = mpegts.createPlayer({ type: 'mpegts', url: url, isLive: true });
          currentMpegts.attachMediaElement(video);
          currentMpegts.load();
          currentMpegts.play().catch(e => console.warn);
        } catch(e) { video.src = url; video.play().catch(e=>console.warn); }
      } else { video.src = url; video.play().catch(e=>console.warn); }
      return;
    }
    // HLS
    if (url.includes('.m3u8')) {
      if (Hls && Hls.isSupported()) {
        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.warn));
      } else { video.src = url; video.play().catch(e=>console.warn); }
      return;
    }
    // MP4 y otros
    video.src = url;
    video.play().catch(e=>console.warn);
  }

  // ========== FAVORITOS ==========
  function saveFavs() {
    localStorage.setItem("klautv_favs", JSON.stringify(favoritos));
    renderFavBar();
    renderRightPanel();
  }
  function toggleFav(canal) {
    const exists = favoritos.some(f => f.url === canal.url);
    if (exists) favoritos = favoritos.filter(f => f.url !== canal.url);
    else favoritos.push(canal);
    saveFavs();
  }
  function renderFavBar() {
    favBar.innerHTML = "";
    if (favoritos.length === 0) {
      favBar.innerHTML = "<span style='opacity:0.6; font-size:0.7rem;'>⭐ Favoritos vacíos</span>";
      return;
    }
    favoritos.forEach(fav => {
      const chip = document.createElement("div");
      chip.className = "fav-chip";
      chip.onclick = () => playUrl(fav.url);
      if (fav.logo) {
        const img = document.createElement("img");
        img.src = fav.logo;
        img.style.width = "20px";
        img.style.height = "20px";
        chip.appendChild(img);
      } else { chip.innerHTML += "⭐ "; }
      chip.appendChild(document.createTextNode(fav.nombre));
      favBar.appendChild(chip);
    });
  }

  // ========== MENÚ PRINCIPAL Y CATEGORÍAS ==========
  function renderPrincipal() {
    nivel = "principal";
    menuContainer.innerHTML = "";
    const opciones = ["TV", "PELÍCULAS", "SERIES", "KIDS"];
    opciones.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.innerText = opt;
      btn.onclick = () => {
        if (opt === "TV") {
          if (Object.keys(categorias).length) renderCategorias();
          else mostrarMensaje("Cargando categorías...");
        } else { mostrarMensaje("Próximamente"); }
      };
      menuContainer.appendChild(btn);
    });
  }

  function renderCategorias() {
    nivel = "categorias";
    const cats = Object.keys(categorias).filter(c => c !== "Otros" && c.trim());
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "menu-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderPrincipal();
    menuContainer.appendChild(backBtn);
    if (!cats.length) {
      const msg = document.createElement("div");
      msg.className = "empty-msg";
      msg.innerText = "No hay categorías";
      menuContainer.appendChild(msg);
      return;
    }
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.innerText = cat;
      btn.onclick = () => {
        canalesActuales = categorias[cat] || [];
        nivel = "canales";
        renderCanalesEnMenu();
        if (canalesActuales.length) playUrl(canalesActuales[0].url);
      };
      menuContainer.appendChild(btn);
    });
  }

  function renderCanalesEnMenu() {
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "menu-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderCategorias();
    menuContainer.appendChild(backBtn);
    canalesActuales.forEach(canal => {
      const btn = document.createElement("button");
      btn.className = "channel-menu-btn";
      if (canal.logo) {
        const img = document.createElement("img");
        img.src = canal.logo;
        img.style.width = "24px";
        img.style.height = "24px";
        img.style.marginRight = "8px";
        btn.appendChild(img);
      }
      const span = document.createElement("span");
      span.innerText = canal.nombre;
      btn.appendChild(span);
      btn.onclick = () => playUrl(canal.url);
      menuContainer.appendChild(btn);
    });
  }

  function renderRightPanel() {
    rightPanel.innerHTML = "";
    if (!todosCanales.length) {
      rightPanel.innerHTML = "<div class='empty-msg'>Cargando canales...</div>";
      return;
    }
    todosCanales.forEach(canal => {
      const item = document.createElement("div");
      item.className = "channel-item";
      if (canal.logo) {
        const img = document.createElement("img");
        img.className = "channel-logo";
        img.src = canal.logo;
        img.onerror = () => img.style.display = "none";
        item.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.style.width = "32px";
        placeholder.style.height = "32px";
        placeholder.style.background = "#222";
        placeholder.style.borderRadius = "6px";
        item.appendChild(placeholder);
      }
      const nameSpan = document.createElement("span");
      nameSpan.className = "channel-name";
      nameSpan.innerText = canal.nombre;
      item.appendChild(nameSpan);
      const favBtn = document.createElement("button");
      favBtn.className = "fav-star";
      favBtn.innerText = favoritos.some(f => f.url === canal.url) ? "★" : "☆";
      if (favoritos.some(f => f.url === canal.url)) favBtn.classList.add("active");
      favBtn.onclick = (e) => {
        e.stopPropagation();
        toggleFav(canal);
      };
      item.appendChild(favBtn);
      item.onclick = () => playUrl(canal.url);
      rightPanel.appendChild(item);
    });
  }

  // ========== CARGA DE LISTA M3U ==========
  function cargarLista() {
    menuContainer.innerHTML = "<div class='empty-msg'>Cargando canales...</div>";
    fetch(M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(data => {
        categorias = {};
        todosCanales = [];
        const lines = data.split("\n");
        let currentName = "", currentGroup = "Otros", currentLogo = null;
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1] : "Canal";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Otros";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : null;
          } else if (line.startsWith("http")) {
            const canal = { nombre: currentName, url: line, logo: currentLogo };
            if (!categorias[currentGroup]) categorias[currentGroup] = [];
            categorias[currentGroup].push(canal);
            todosCanales.push(canal);
          }
        }
        if (Object.keys(categorias).length === 0) throw new Error("No canales");
        renderPrincipal();
        renderFavBar();
        renderRightPanel();
        const primeras = Object.keys(categorias);
        if (primeras.length) {
          const primeraCat = primeras[0];
          canalesActuales = categorias[primeraCat] || [];
          if (canalesActuales.length) playUrl(canalesActuales[0].url);
        }
      })
      .catch(err => {
        console.error(err);
        categorias = {
          "CINE PREMIUM": [
            { nombre: "Demo 1", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null },
            { nombre: "Demo 2", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_2mb.mp4", logo: null }
          ],
          "ARGENTINA": [
            { nombre: "Canal Arg", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null }
          ]
        };
        todosCanales = [];
        Object.values(categorias).forEach(arr => todosCanales.push(...arr));
        renderPrincipal();
        renderFavBar();
        renderRightPanel();
        const primeras = Object.keys(categorias);
        if (primeras.length) {
          canalesActuales = categorias[primeras[0]];
          if (canalesActuales.length) playUrl(canalesActuales[0].url);
        }
        mostrarMensaje("Usando canales de ejemplo (sin conexión remota)");
      });
  }

  function mostrarMensaje(msg) {
    const div = document.createElement("div");
    div.style.position = "fixed";
    div.style.bottom = "80px";
    div.style.left = "50%";
    div.style.transform = "translateX(-50%)";
    div.style.background = "rgba(0,0,0,0.7)";
    div.style.padding = "6px 15px";
    div.style.borderRadius = "30px";
    div.style.fontSize = "0.7rem";
    div.style.zIndex = "1000";
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2000);
  }

  // ========== PANELES OCULTABLES ==========
  function toggleLeft() {
    leftVisible = !leftVisible;
    leftPanel.style.display = leftVisible ? "flex" : "none";
  }
  function toggleRight() {
    rightVisible = !rightVisible;
    rightPanel.style.display = rightVisible ? "block" : "none";
  }
  toggleLeftBtn.onclick = toggleLeft;
  toggleRightBtn.onclick = toggleRight;

  // ========== PANTALLA COMPLETA (SOLO REPRODUCTOR) ==========
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      playerContainer.requestFullscreen().catch(e => console.warn);
      playerContainer.classList.add('fullscreen');
    } else {
      document.exitFullscreen();
      playerContainer.classList.remove('fullscreen');
    }
  }
  fullscreenBtn.onclick = toggleFullscreen;
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
      playerContainer.classList.remove('fullscreen');
    }
  });

  // ========== CHROMECAST REAL ==========
  window['__onGCastApiAvailable'] = function(loaded, errorInfo) {
    if (loaded) {
      try {
        const context = cast.framework.CastContext.getInstance();
        context.setOptions({
          receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
          autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });
        context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, (e) => {
          if (e.sessionState === cast.framework.SessionState.SESSION_STARTED) {
            castSession = context.getCurrentSession();
            mostrarMensaje("Chromecast conectado");
          } else if (e.sessionState === cast.framework.SessionState.SESSION_ENDED) {
            castSession = null;
            mostrarMensaje("Chromecast desconectado");
          }
        });
        castInitialized = true;
      } catch(e) { console.warn(e); }
    }
  };
  castButton.addEventListener('click', () => {
    if (!castInitialized) {
      mostrarMensaje("Chromecast no disponible. Asegúrate de usar HTTPS.");
      return;
    }
    const context = cast.framework.CastContext.getInstance();
    context.requestSession().then(() => {
      if (castSession && video.src) {
        const mediaInfo = new chrome.cast.media.MediaInfo(video.src, 'video/mp4');
        mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
        mediaInfo.metadata.title = "KlauTV";
        mediaInfo.metadata.images = [{ url: "https://tinyurl.com/wpnumntc" }];
        const request = new chrome.cast.media.LoadRequest(mediaInfo);
        castSession.loadMedia(request).then(() => {
          mostrarMensaje("Enviado a la TV");
        }, () => mostrarMensaje("Error al enviar el video"));
      } else {
        mostrarMensaje("No hay video para enviar");
      }
    }, () => {
      mostrarMensaje("No se pudo conectar al Chromecast");
    });
  });

  // Iniciar
  cargarLista();
</script>
</body>
</html>
