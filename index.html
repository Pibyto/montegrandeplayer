<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>KlauTV - Android TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none !important; }
    body { background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; min-height: 100vh; padding: 15px; overflow: hidden; }
    .toolbar { display: none; }
    .watermark-logo { display: none; } /* Marca de agua completamente eliminada */
    
    /* Logo principal ClauTVHD - solo visible en menú principal, tamaño reducido */
    .logo-principal {
      position: fixed;
      top: 20px;
      right: 70px;
      width: 50px;  /* Tamaño reducido de 70px a 50px */
      height: auto;
      z-index: 100000;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .logo-principal.oculto {
      display: none;
    }
    
    .app { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1400px; margin: 0 auto; height: calc(100vh - 30px); }
    .left-panel { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 200px 15px 15px 15px; height: 100%; overflow-y: auto; flex: 0 0 280px; display: block; }
    .right-panel { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 15px 12px; height: 100%; overflow-y: auto; flex: 0 0 320px; display: block; }
    .left-panel.oculto { display: none; }
    .right-panel.oculto { display: none; }
    .center-panel { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 15px; }
    .player-container { background: #000; border-radius: 20px; overflow: hidden; width: 100%; max-width: 100%; aspect-ratio: 16 / 9; box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; display: block; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    video::-webkit-media-controls { display: none !important; }
    .dynamic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 10px; background: rgba(0,0,0,0.7); border-radius: 20px; height: 100%; overflow-y: auto; }
    .dynamic-grid.categorias-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .item-card { background: rgba(0,0,0,0.6); border-radius: 16px; overflow: hidden; cursor: pointer; text-align: center; transition: transform 0.1s; }
    .item-card.poster-card { padding-bottom: 8px; }
    .item-card.text-card { padding: 20px 10px; }
    .item-card.volver-card { background: #ff8800; color: #000; font-weight: bold; border: none; }
    .item-card.volver-card .item-title { color: #000; font-weight: bold; }
    .item-card:focus { background: rgba(60,60,60,0.8); transform: scale(1.02); }
    .item-poster { width: 100%; height: auto; display: block; background-color: #0a0a0a; }
    .item-title { font-size: 0.8rem; padding: 8px 6px; color: rgba(255,255,255,0.8); text-align: center; line-height: 1.3; }
    .fav-bar { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 40px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
    .fav-chip { background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.5); }
    .fav-chip:focus { background: rgba(60,60,60,0.6); }
    .menu-list { display: flex; flex-direction: column; gap: 20px; }
    .menu-btn { background: transparent; border: none; color: rgba(255,255,255,0.12); font-size: 1.5rem; font-weight: 400; letter-spacing: 2px; padding: 5px 0; text-align: left; cursor: pointer; width: 100%; transition: all 0.15s ease; }
    .menu-btn:focus { color: rgba(255,255,255,0.4); transform: scale(1.01); }
    .cat-btn, .channel-menu-btn { background: rgba(0,0,0,0.5); border: none; color: rgba(255,255,255,0.5); font-size: 0.9rem; font-weight: 400; padding: 12px 14px; border-radius: 14px; text-align: left; cursor: pointer; width: 100%; }
    .cat-btn:focus, .channel-menu-btn:focus { background: rgba(60,60,60,0.7); color: rgba(255,255,255,0.8); }
    .back-btn { background: rgba(0,0,0,0.6); color: rgba(255,204,136,0.7); margin-bottom: 10px; font-size: 0.9rem; font-weight: normal; }
    .channel-item { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.5); margin-bottom: 8px; padding: 10px 12px; border-radius: 14px; cursor: pointer; }
    .channel-item:focus { background: rgba(60,60,60,0.7); }
    .channel-logo { width: 36px; height: 36px; object-fit: contain; border-radius: 8px; }
    .channel-name { flex: 1; font-size: 0.8rem; font-weight: 400; color: rgba(255,255,255,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-star { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 1.1rem; cursor: pointer; width: 32px; }
    .fav-star.active { color: rgba(255,204,136,0.7); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #1a1a2a; }
    ::-webkit-scrollbar-thumb { background: rgba(255,204,136,0.4); border-radius: 10px; }
    .empty-msg { text-align: center; padding: 20px; opacity: 0.4; font-size: 0.8rem; }
    
    /* Hora y clima */
    .info-clima {
      position: absolute;
      bottom: 8px;
      right: 40px;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Segoe UI', system-ui, monospace;
      z-index: 99999;
      pointer-events: none;
      font-weight: 600;
    }
    .hora { font-size: 1.4rem; font-weight: 600; color: rgba(255,255,255,0.92); text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .separador { font-size: 1.2rem; font-weight: 500; color: #3399ff; }
    .clima { display: flex; align-items: center; gap: 4px; font-size: 1.4rem; font-weight: 600; color: rgba(255,255,255,0.92); text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .clima-temp { font-weight: 600; }
    
    @media (max-width: 800px) {
      body { padding: 10px; }
      .left-panel, .right-panel { flex-basis: 100%; height: auto; max-height: 40vh; }
      .menu-btn { font-size: 1.2rem; }
      .left-panel { padding: 150px 15px 15px 15px; }
      .dynamic-grid.categorias-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .logo-principal { width: 40px; top: 15px; right: 15px; } /* Tamaño reducido en móvil */
    }
  </style>
</head>
<body>

<!-- Marca de agua completamente eliminada (ya no existe) -->
<!-- Logo principal ClauTVHD - solo aparece en menú principal -->
<img class="logo-principal" id="logoPrincipal" src="https://tinyurl.com/yrfarar9" alt="ClauTVHD">

<div class="toolbar">
  <button id="toggleLeftBtn">☰</button>
  <button id="toggleRightBtn">▶</button>
  <button id="fullscreenBtn">⛶</button>
  <button id="castButton" style="display:none;"></button>
</div>

<div class="app">
  <div class="left-panel" id="leftPanel">
    <div id="menuContainer" class="menu-list"></div>
  </div>
  <div class="center-panel">
    <div class="player-container" id="playerContainer">
      <video id="videoPlayer" autoplay playsinline poster="" crossorigin="anonymous"></video>
    </div>
    <div id="dynamicArea" style="display: none;">
      <div id="dynamicGrid" class="dynamic-grid"></div>
    </div>
    <div class="fav-bar" id="favBar"></div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
  // ========== LOGO PRINCIPAL CLAUTVHD - SOLO MENÚ PRINCIPAL ==========
  const logoPrincipal = document.getElementById('logoPrincipal');
  
  // Función control: solo muestra logo en menú principal (TV Principal)
  function actualizarVisibilidadLogo() {
    if (!logoPrincipal) return;
    // El logo solo debe mostrarse cuando:
    // 1. Estamos en modo TV (modoActual === 'tv')
    // 2. Y estamos en el menú principal (sin categorías abiertas? El menú principal se identifica porque leftPanel tiene renderPrincipal)
    // Para ser más precisos: El logo se muestra SOLO en la pantalla de inicio (cuando se ven las opciones TV, PELICULAS, SERIES, KIDS)
    // Y NO se muestra cuando: se está reproduciendo un canal, se está en categorías de TV, en Peliculas, Series o Kids.
    
    const esMenuPrincipal = (modoActual === 'tv' && nivelInterno === 'categorias' && !document.querySelector('.cat-btn')); 
    // 'nivelInterno' se usa para tracking dentro del modo TV: 'categorias' es el listado principal, luego cambia a items cuando se selecciona una categoría.
    // Otra forma: verificamos si el menuContainer contiene menu-btn (las opciones principales)
    const tieneMenuPrincipal = menuContainer && menuContainer.querySelectorAll('.menu-btn').length > 0;
    
    if (modoActual === 'tv' && tieneMenuPrincipal && document.getElementById('dynamicArea').style.display !== 'block') {
      logoPrincipal.classList.remove('oculto');
    } else {
      logoPrincipal.classList.add('oculto');
    }
  }
  
  // Al iniciar, aseguramos que logo sea visible
  logoPrincipal.classList.remove('oculto');

  // ========== CONFIGURACIÓN DE LOGOS ==========
  const logosCanales = [
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208744/tracks-v1a1/mono.m3u8", logo: "https://tinyurl.com/2uysrbe7", top: "20px", right: "40px", widthNormal: "100px", widthFullscreen: "180px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208138/tracks-v1a1/mono.m3u8", logo: "https://tinyurl.com/6tptw4t2", top: "20px", right: "40px", widthNormal: "150px", widthFullscreen: "150px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-209163/playlist.m3u8", logo: "https://tinyurl.com/48xkysmd", top: "20px", right: "40px", widthNormal: "150px", widthFullscreen: "150px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208817/playlist.m3u8", logo: "https://tinyurl.com/4m768mja", top: "20px", right: "40px", widthNormal: "150px", widthFullscreen: "150px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-209909/playlist.m3u8", logo: "https://tinyurl.com/89bw22fh", top: "20px", right: "40px", widthNormal: "150px", widthFullscreen: "150px" }
  ];

  // ========== CANALES CON HORA Y CLIMA ==========
  const canalesConClima = [
    "https://live20.bozztv.com/giatvplayout7/giatv-208744/tracks-v1a1/mono.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-208138/tracks-v1a1/mono.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-209163/playlist.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-208817/playlist.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-209909/playlist.m3u8"
  ];

  // ========== CLIMA ==========
  let intervaloReloj = null;
  let intervaloClima = null;
  let climaVisible = false;
  let seriesList = [];
  let kidsList = [];

  function actualizarReloj() {
    const ahora = new Date();
    const horas = ahora.getHours().toString().padStart(2, '0');
    const minutos = ahora.getMinutes().toString().padStart(2, '0');
    const relojDiv = document.getElementById('relojClima');
    if (relojDiv) relojDiv.textContent = `${horas}:${minutos}`;
  }

  async function actualizarClima() {
    const climaContenedor = document.getElementById('climaInfo');
    if (!climaContenedor) return;
    
    try {
      const lat = -34.8167;
      const lon = -58.4667;
      const respuesta = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`);
      if (!respuesta.ok) throw new Error();
      const datos = await respuesta.json();
      const temp = Math.round(datos.current_weather.temperature);
      const codigoClima = datos.current_weather.weathercode;
      
      let icono = "🌡️";
      if (codigoClima === 0) icono = "☀️";
      else if (codigoClima === 1 || codigoClima === 2) icono = "⛅";
      else if (codigoClima === 3) icono = "☁️";
      else if (codigoClima >= 45 && codigoClima <= 48) icono = "🌫️";
      else if ((codigoClima >= 51 && codigoClima <= 67) || (codigoClima >= 80 && codigoClima <= 82)) icono = "🌧️";
      else if (codigoClima >= 71 && codigoClima <= 77) icono = "❄️";
      else if (codigoClima >= 95 && codigoClima <= 99) icono = "⛈️";
      
      climaContenedor.innerHTML = `${temp}°C ${icono}`;
    } catch (error) {
      climaContenedor.innerHTML = `--°C 🌡️`;
    }
  }

  function mostrarHoraYClima(mostrar) {
    if (mostrar && !climaVisible) {
      if (!document.getElementById('infoClima')) {
        const playerContainerLocal = document.getElementById("playerContainer");
        const climaDiv = document.createElement('div');
        climaDiv.id = 'infoClima';
        climaDiv.className = 'info-clima';
        climaDiv.innerHTML = `
          <div class="hora" id="relojClima">--:--</div>
          <div class="separador">|</div>
          <div class="clima" id="climaInfo">--°C 🌡️</div>
        `;
        playerContainerLocal.appendChild(climaDiv);
        if (intervaloReloj) clearInterval(intervaloReloj);
        if (intervaloClima) clearInterval(intervaloClima);
        actualizarReloj();
        intervaloReloj = setInterval(actualizarReloj, 60000);
        actualizarClima();
        intervaloClima = setInterval(actualizarClima, 600000);
      }
      climaVisible = true;
    } else if (!mostrar && climaVisible) {
      const climaDiv = document.getElementById('infoClima');
      if (climaDiv) climaDiv.remove();
      if (intervaloReloj) { clearInterval(intervaloReloj); intervaloReloj = null; }
      if (intervaloClima) { clearInterval(intervaloClima); intervaloClima = null; }
      climaVisible = false;
    }
  }

  // ========== RESTO DEL CÓDIGO (SIN MODIFICACIONES FUNCIONALES, SOLO GESTIÓN DE LOGO) ==========
  window.addEventListener('error', (e) => {
    if (e.message && (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))) {
      e.preventDefault();
      return false;
    }
  });

  const TV_M3U_URL = "https://tinyurl.com/2n2etx65";
  const MOVIES_M3U_URL = "https://tinyurl.com/2vz6vphp";
  const SERIES_M3U_URL = "https://tinyurl.com/seriesmgtv";
  const KIDS_M3U_URL = "https://tinyurl.com/peliskids";
  
  let categorias = {};
  let todosCanales = [];
  let favoritos = JSON.parse(localStorage.getItem("klautv_favs")) || [];
  let nivel = "principal";
  let canalesActuales = [];
  let currentHls = null, currentMpegts = null;
  let leftVisible = true, rightVisible = true;
  let peliculasList = [];
  let modoPeliculas = false;
  let currentPlayingUrl = null;
  let isFullscreen = false;
  let doubleClickTimer = null;
  let currentChannelIndex = 0;
  let logoActual = null;
  let modoActual = 'tv';
  let nivelInterno = "categorias";  // 'categorias' para menú principal de TV, 'items' para lista de canales por categoria

  const menuContainer = document.getElementById("menuContainer");
  const rightPanel = document.getElementById("rightPanel");
  const leftPanel = document.getElementById("leftPanel");
  const video = document.getElementById("videoPlayer");
  const favBar = document.getElementById("favBar");
  const playerContainer = document.getElementById("playerContainer");
  const dynamicArea = document.getElementById("dynamicArea");
  const dynamicGrid = document.getElementById("dynamicGrid");
  const toggleLeftBtn = document.getElementById("toggleLeftBtn");
  const toggleRightBtn = document.getElementById("toggleRightBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const castButton = document.getElementById("castButton");

  function abrirEnVLC(url) {
    window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;package=org.videolan.vlc;scheme=https;end;`;
  }
  
  function abrirConReproductorAlternativo(url) {
    window.location.href = `intent://${url.replace(/^https?:\/\//, '')}#Intent;package=com.mxtech.videoplayer.ad;scheme=https;end;`;
  }

  function destroyPlayers() {
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    if (currentMpegts) { currentMpegts.destroy(); currentMpegts = null; }
  }

  function ajustarTamañoLogo() {
    if (!logoActual || !currentPlayingUrl) return;
    const config = logosCanales.find(c => c.url === currentPlayingUrl);
    if (config) {
      logoActual.style.width = document.fullscreenElement ? config.widthFullscreen : config.widthNormal;
    }
  }

  function mostrarLogo(canalUrl) {
    if (logoActual) { logoActual.remove(); logoActual = null; }
    const config = logosCanales.find(c => c.url === canalUrl);
    if (config) {
      const img = document.createElement('img');
      img.src = config.logo;
      img.style.cssText = `position:absolute; top:${config.top}; right:${config.right}; width:${config.widthNormal}; height:auto; z-index:99998; pointer-events:none;`;
      playerContainer.appendChild(img);
      logoActual = img;
      setTimeout(ajustarTamañoLogo, 100);
    }
  }

  document.addEventListener('fullscreenchange', ajustarTamañoLogo);

  function playUrl(originalUrl, index) {
    if (!originalUrl) return;
    currentPlayingUrl = originalUrl;
    if (index !== undefined) currentChannelIndex = index;
    
    if (modoActual !== 'tv') {
      dynamicArea.style.display = "none";
      playerContainer.style.display = "block";
      leftPanel.classList.remove("oculto");
      rightPanel.classList.remove("oculto");
      leftVisible = true;
      rightVisible = true;
      modoActual = 'tv';
      nivelInterno = "categorias";
    }
    
    mostrarLogo(originalUrl);
    
    // Ocultar logo principal al reproducir cualquier contenido
    logoPrincipal.classList.add('oculto');
    
    if (canalesConClima.includes(originalUrl)) {
      mostrarHoraYClima(true);
    } else {
      mostrarHoraYClima(false);
    }
    
    destroyPlayers();
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (/(\:25461\/|\.ts)/i.test(originalUrl)) {
      if (window.mpegts && mpegts.isSupported()) {
        try {
          currentMpegts = mpegts.createPlayer({ type: 'mpegts', url: originalUrl, isLive: true, liveBufferLatencyChasing: true, enableWorker: true });
          currentMpegts.attachMediaElement(video);
          currentMpegts.load();
          currentMpegts.play().catch(e => console.warn);
        } catch(e) { video.src = originalUrl; video.play().catch(e => console.warn); }
      } else { video.src = originalUrl; video.play().catch(e => console.warn); }
      return;
    }
    
    if (/\.m3u8/i.test(originalUrl)) {
      if (Hls && Hls.isSupported()) {
        currentHls = new Hls({ enableWorker: true, lowLatencyMode: true, liveSyncDurationCount: 3, liveMaxLatencyDurationCount: 10, maxBufferLength: 30, maxMaxBufferLength: 60 });
        currentHls.loadSource(originalUrl);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.warn));
        currentHls.on(Hls.Events.ERROR, (e,d) => { if(d.fatal && d.type === Hls.ErrorTypes.NETWORK_ERROR) currentHls.startLoad(); });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = originalUrl; video.play().catch(e => console.warn); }
      return;
    }
    video.src = originalUrl;
    video.play().catch(e => console.warn);
  }

  function intentarReproducirPelicula(url) {
    abrirEnVLC(url);
    setTimeout(() => { abrirConReproductorAlternativo(url); }, 2000);
  }

  function cambiarCanal(direccion) {
    if (todosCanales.length === 0) return;
    let nuevoIndex = currentChannelIndex + direccion;
    if (nuevoIndex < 0) nuevoIndex = todosCanales.length - 1;
    if (nuevoIndex >= todosCanales.length) nuevoIndex = 0;
    currentChannelIndex = nuevoIndex;
    playUrl(todosCanales[currentChannelIndex].url, currentChannelIndex);
  }

  function toggleFullscreen() {
    if (!isFullscreen) {
      if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
      else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
      isFullscreen = true;
    } else {
      if (document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
      isFullscreen = false;
    }
  }

  document.addEventListener("fullscreenchange", () => { isFullscreen = !!document.fullscreenElement; });

  function getFocusableLeft() {
    return [...document.querySelectorAll("#leftPanel .menu-btn, #leftPanel .cat-btn, #leftPanel .channel-menu-btn, #leftPanel .back-btn")];
  }

  function getFocusableRight() {
    return [...document.querySelectorAll("#rightPanel .channel-item")];
  }

  function getFocusableDynamic() {
    return [...document.querySelectorAll("#dynamicGrid .item-card")];
  }

  function salirDeModoActual() {
    dynamicArea.style.display = "none";
    playerContainer.style.display = "block";
    leftPanel.classList.remove("oculto");
    rightPanel.classList.remove("oculto");
    leftVisible = true;
    rightVisible = true;
    modoActual = 'tv';
    nivelInterno = "categorias";
    // Restauramos render principal y verificamos logo
    renderPrincipal();
    actualizarVisibilidadLogo();
  }

  document.addEventListener("keydown", (e) => {
    const key = e.key;
    
    if (modoActual !== 'tv') {
      if (key === "Backspace" || key === "Escape") {
        e.preventDefault();
        if (nivelInterno === "items") {
          nivelInterno = "categorias";
          if (modoActual === 'peliculas') renderCategoriasPeliculas();
          else if (modoActual === 'series') renderCategoriasSeries();
        } else {
          salirDeModoActual();
          if (todosCanales.length > 0 && currentChannelIndex < todosCanales.length) {
            playUrl(todosCanales[currentChannelIndex].url, currentChannelIndex);
          }
        }
        return;
      }
      if (key === "ArrowLeft" || key === "ArrowRight" || key === "ArrowUp" || key === "ArrowDown") {
        e.preventDefault();
        let items = getFocusableDynamic();
        if (items.length === 0) return;
        let current = document.activeElement;
        let idx = items.indexOf(current);
        if (key === "ArrowLeft") { if (idx > 0) items[idx-1]?.focus(); }
        else if (key === "ArrowRight") { if (idx < items.length-1) items[idx+1]?.focus(); }
        else if (key === "ArrowUp") {
          let cols = Math.floor(dynamicGrid.clientWidth / 150) || 4;
          let newIdx = idx - cols;
          if (newIdx >= 0) items[newIdx]?.focus();
        } else if (key === "ArrowDown") {
          let cols = Math.floor(dynamicGrid.clientWidth / 150) || 4;
          let newIdx = idx + cols;
          if (newIdx < items.length) items[newIdx]?.focus();
        }
        return;
      }
      if (key === "Enter") {
        let active = document.activeElement;
        if (active && active.click) active.click();
      }
      return;
    }
    
    if (modoActual === 'tv') {
      if (isFullscreen && (key === "ArrowUp" || key === "ArrowDown")) {
        e.preventDefault();
        if (key === "ArrowUp") cambiarCanal(-1);
        else cambiarCanal(1);
        return;
      }
      
      if (key === "Enter") {
        if (doubleClickTimer === null) {
          doubleClickTimer = setTimeout(() => {
            doubleClickTimer = null;
            let active = document.activeElement;
            if (active && active.click) active.click();
          }, 250);
        } else {
          clearTimeout(doubleClickTimer);
          doubleClickTimer = null;
          e.preventDefault();
          toggleFullscreen();
        }
        return;
      }
      
      if (key === "ArrowLeft") {
        e.preventDefault();
        leftVisible = !leftVisible;
        leftPanel.classList.toggle("oculto", !leftVisible);
        if (leftVisible) setTimeout(() => getFocusableLeft()[0]?.focus(), 50);
        return;
      }
      if (key === "ArrowRight") {
        e.preventDefault();
        rightVisible = !rightVisible;
        rightPanel.classList.toggle("oculto", !rightVisible);
        if (rightVisible) setTimeout(() => getFocusableRight()[0]?.focus(), 50);
        return;
      }
      
      if (leftVisible && !leftPanel.classList.contains("oculto")) {
        let items = getFocusableLeft();
        let current = document.activeElement;
        let idx = items.indexOf(current);
        if (key === "ArrowUp") { e.preventDefault(); if (idx > 0) items[idx-1]?.focus(); }
        else if (key === "ArrowDown") { e.preventDefault(); if (idx < items.length-1) items[idx+1]?.focus(); }
        return;
      }
      if (rightVisible && !rightPanel.classList.contains("oculto")) {
        let items = getFocusableRight();
        let current = document.activeElement;
        let idx = items.indexOf(current);
        if (key === "ArrowUp") { e.preventDefault(); if (idx > 0) items[idx-1]?.focus(); }
        else if (key === "ArrowDown") { e.preventDefault(); if (idx < items.length-1) items[idx+1]?.focus(); }
        return;
      }
    }
  });

  function cargarPeliculas() {
    return fetch(MOVIES_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        peliculasList = [];
        const lines = data.split("\n");
        let currentName = "", currentLogo = "", currentUrl = "";
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1].trim() : "Película";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
          } else if (line.startsWith("http")) {
            currentUrl = line;
            if (currentName && currentUrl) {
              peliculasList.push({ nombre: currentName, url: currentUrl, logo: currentLogo !== "http://127.0.0.1/" ? currentLogo : null });
            }
            currentName = ""; currentLogo = ""; currentUrl = "";
          }
        }
        if (modoActual === 'peliculas') renderCategoriasPeliculas();
      }).catch(e => console.error("Error pelis:", e));
  }

  function renderRightPanel() {
    rightPanel.innerHTML = "";

      }

      favBtn.setAttribute("tabindex", "0");
      favBtn.onclick = (e) => { e.stopPropagation(); toggleFav(canal, e); };
      favBtn.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') { e.stopPropagation(); toggleFav(canal, e); } };
      item.appendChild(favBtn);

      item.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') item.click(); };
      rightPanel.appendChild(item);
    });
  }

  function cargarListaTV() {
    fetch(TV_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        categorias = {}; todosCanales = [];
        const lines = data.split("\n");
        let currentName = "", currentGroup = "Otros", currentLogo = null;
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1] : "Canal";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Otros";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : null;
          } else if (line.startsWith("http")) {
            const canal = { nombre: currentName, url: line, logo: currentLogo };
            if (!categorias[currentGroup]) categorias[currentGroup] = [];
            categorias[currentGroup].push(canal);
            todosCanales.push(canal);
          }
        }
        if (Object.keys(categorias).length === 0) throw new Error();
        renderPrincipal(); renderFavBar(); renderRightPanel();
        const primeras = Object.keys(categorias);
        if (primeras.length) {
          const primeraCat = primeras[0];
          canalesActuales = categorias[primeraCat] || [];
          if (canalesActuales.length) {
            currentChannelIndex = 0;
            playUrl(canalesActuales[0].url, 0);
          }
        }
        actualizarVisibilidadLogo();
      })
      .catch(() => {
        categorias = { "PRINCIPAL": [{ nombre: "Demo TV", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null }] };
        todosCanales = categorias.PRINCIPAL;
        renderPrincipal(); renderFavBar(); renderRightPanel();
        currentChannelIndex = 0;
        playUrl(todosCanales[0].url, 0);
        actualizarVisibilidadLogo();
      });
  }

  function toggleLeftClick() {
    if (modoActual === 'tv') {
      leftVisible = !leftVisible;
      leftPanel.classList.toggle("oculto", !leftVisible);
    }
  }
  function toggleRightClick() {
    if (modoActual === 'tv') {
      rightVisible = !rightVisible;
      rightPanel.classList.toggle("oculto", !rightVisible);
    }
  }
  
  if (toggleLeftBtn) toggleLeftBtn.onclick = toggleLeftClick;
  if (toggleRightBtn) toggleRightBtn.onclick = toggleRightClick;
  if (fullscreenBtn) fullscreenBtn.onclick = toggleFullscreen;

  let castContext = null;
  window['__onGCastApiAvailable'] = (loaded) => {
    if (loaded && chrome.cast && chrome.cast.isAvailable) {
      try {
        castContext = cast.framework.CastContext.getInstance();
        castContext.setOptions({ receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID, autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED });
      } catch(e) {}
    }
  };
  if (castButton) castButton.onclick = () => { if(castContext) castContext.requestSession(); };

  cargarListaTV();
  cargarPeliculas();
  cargarSeries();
  cargarKids();
