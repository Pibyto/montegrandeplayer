<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MGTV MAX - Android TV</title>
  <!-- === PWA: MANIFEST PARA INSTALAR DESDE LA WEB === -->
  <link rel="manifest" href="data:application/json;charset=utf-8,{
    \"name\": \"MGTV MAX\",
    \"short_name\": \"MGTV\",
    \"start_url\": \".\",
    \"display\": \"standalone\",
    \"background_color\": \"#000000\",
    \"theme_color\": \"#000000\",
    \"icons\": [{
      \"src\": \"https://tinyurl.com/IconodeTV\",
      \"sizes\": \"192x192\",
      \"type\": \"image/png\"
    }]
  }">
  <!-- === SDK DE CHROMECAST ORIGINAL === -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none !important; user-select: none; }

    body {
      background-image: url('https://tinyurl.com/Maximag') !important;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
      background-color: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: sans-serif;
    }

    .player-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; z-index: 1;
    }

    video {
      width: 100%; height: 100%; object-fit: contain; background: transparent; opacity: 0;
      transition: opacity 0.3s ease-in-out; -webkit-transition: opacity 0.3s ease-in-out;
    }

    video.video-activo { opacity: 1; background: #000; }

    .audio-visual-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
      background-color: #000; display: none; justify-content: center; align-items: center; overflow: hidden;
    }
    .audio-visual-layer img { width: 100%; height: 100%; object-fit: cover !important; }

    .barra-alias-tv {
      position: fixed; top: 8px; left: 50%; transform: translateX(-50%); width: max-content;
      display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 25px;
      background: transparent !important; border: 3px solid #00ccff; box-shadow: 0 0 15px #ff00cc;
      border-radius: 40px; padding: 10px 30px; z-index: 99999; opacity: 0; visibility: hidden;
      transition: opacity 0.4s ease, transform 0.4s ease; white-space: nowrap;
    }
    .barra-alias-tv.visible { opacity: 1; visibility: visible; transform: translateX(-50%); }

    .titulo-alias { color: #ffffff; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
    .texto-alias { color: #ffffff; font-size: 1.2rem; font-weight: bold; }
    .contenedor-banco { display: flex; align-items: center; gap: 10px; }
    .contenedor-banco img { height: 40px; width: auto; object-fit: contain; }

    .cast-container { display: none; }

    /* === BOTÓN DE INSTALACIÓN PWA (SOLO EN WEB) === */
    #pwaInstallButton {
      display: none;
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.7);
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    #pwaInstallButton:hover { background: rgba(0, 0, 0, 0.9); }
    #pwaInstallButton img { width: 20px; height: 20px; vertical-align: middle; }
    #pwaInstallButton span { color: white; margin-left: 5px; font-size: 12px; }

    .side-menu {
      position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 15px; z-index: 20;
      transition: opacity 0.4s ease, transform 0.4s ease; opacity: 1;
    }
    .side-menu.hidden-ui { opacity: 0; transform: translateY(-50%) translateX(-100px); pointer-events: none; }

    .menu-icon {
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid transparent !important; border-radius: 50%; transition: all 0.2s;
    }
    .menu-icon img { width: 24px; height: 24px; filter: brightness(0) saturate(100%) invert(100%); }
    .menu-icon:focus, .menu-icon.focused { border-color: #ffcc00 !important; background: rgba(255,255,255,0.2) !important; transform: scale(1.1); }
    .menu-icon:focus img, .menu-icon.focused img { filter: brightness(0) saturate(100%) invert(100%) !important; }

    .content-area {
      position: fixed; bottom: 20px; left: 90px; right: 20px; background: transparent;
      z-index: 10; max-height: 50%; overflow-y: auto; overflow-x: hidden; padding-bottom: 30px;
      transition: opacity 0.4s ease, transform 0.4s ease; opacity: 1;
      scroll-behavior: smooth;
    }
    .content-area::-webkit-scrollbar { width: 0px; background: transparent; }

    .content-area.hidden-ui { opacity: 0; transform: translateY(100px); pointer-events: none; }
    .section-title { color: white; font-size: 1.1rem; font-weight: bold; margin: 15px 0 5px 0; text-shadow: 1px 1px 3px black; text-transform: uppercase; }
    .scroll-row { display: flex; overflow-x: hidden; gap: 15px; padding: 10px 0; scroll-behavior: smooth; width: 100%; }

    .channel-card {
      flex-shrink: 0; width: 160px; height: 100px; background: rgba(17, 17, 17, 0.85); border-radius: 12px;
      border: 2px solid #00ccff; box-shadow: 0 0 0 2px #ff00cc; padding: 10px;
      text-align: center; cursor: pointer; transition: all 0.2s ease;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .channel-card img { height: 50px; max-width: 100%; object-fit: contain; margin-bottom: 5px; filter: none !important; }
    .channel-card span { display: block; font-size: 12px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .channel-card:focus, .channel-card.focused { border: 2px solid #ffcc00; box-shadow: 0 0 10px #ffcc00; transform: scale(1.05); }

    .poster-card {
      flex-shrink: 0; width: 110px; cursor: pointer; border-radius: 12px;
      border: 2px solid #00ccff; box-shadow: 0 0 0 2px #ff00cc; transition: all 0.2s ease;
      background: #111; overflow: hidden;
    }
    .poster-card img { width: 100%; border-radius: 10px; aspect-ratio: 2 / 3; object-fit: cover; filter: none !important; }
    .poster-card span { display: block; font-size: 11px; color: white; text-align: center; padding: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .poster-card:focus, .poster-card.focused { border: 2px solid #ffcc00; box-shadow: 0 0 10px #ffcc00; transform: scale(1.05); }

    .ver-todo-card {
      flex-shrink: 0; width: 110px; background: rgba(0,0,0,0.7); border-radius: 12px;
      border: 2px solid #38bdf8; display: flex; align-items: center; justify-content: center;
      cursor: pointer; aspect-ratio: 2 / 3; text-align: center;
    }
    .ver-todo-card span { color: #38bdf8; font-weight: bold; font-size: 12px; }
    .ver-todo-card:focus, .ver-todo-card.focused { border: 2px solid #ffcc00; box-shadow: 0 0 10px #ffcc00; transform: scale(1.05); }

    .category-item {
      display: inline-block; background: rgba(17, 17, 17, 0.85); color: white; font-size: 1rem;
      padding: 8px 18px; margin-right: 15px; border-radius: 30px; cursor: pointer;
      border: 2px solid #00ccff; box-shadow: 0 0 0 2px #ff00cc; flex-shrink: 0; transition: all 0.2s ease;
    }
    .category-item:focus, .category-item.focused {
      border: 2px solid #ffcc00; box-shadow: 0 0 10px #ffcc00; background: rgba(255, 255, 255, 0.2) !important; transform: scale(1.05);
    }

    .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #ff00cc; padding: 12px 20px; border-radius: 40px; z-index: 9999; display: none; }
    .channel-logo { position: fixed; top: 20px; right: 40px; max-width: 130px; max-height: 70px; z-index: 9998; pointer-events: none; }

    @media screen and (max-width: 768px) {
      .barra-alias-tv {
        width: 92%; max-width: 440px; flex-direction: row; flex-wrap: wrap; gap: 10px; padding: 6px 15px;
        border-radius: 20px; background: rgba(0, 0, 0, 0.9) !important; border-width: 2px; box-shadow: 0 0 10px #ff00cc; top: 5px;
      }
      .titulo-alias { font-size: 0.75rem; width: 100%; text-align: center; margin-bottom: -2px; letter-spacing: 0.5px; }
      .contenedor-banco { flex: 1; justify-content: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 10px; }
      .texto-alias { font-size: 0.95rem; font-weight: bold; }
      .contenedor-banco img { height: 20px; }

      .cast-container {
        display: block !important;
        position: fixed;
        top: 62px;
        right: 22px;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.7);
        padding: 2px;
        border-radius: 50%;
        transition: opacity 0.4s ease;
      }
      google-cast-launcher {
        display: block;
        width: 35px;
        height: 35px;
        cursor: pointer;
        --connected-color: #00ccff;
        --disconnected-color: #ffffff;
      }

      .side-menu {
        left: 0; top: 0; transform: none; width: 100%; height: auto; flex-direction: row;
        justify-content: space-around; background: rgba(0, 0, 0, 0.85); padding: 8px 0;
        border-bottom: 1px solid rgba(0, 204, 255, 0.3);
      }
      .side-menu.hidden-ui { transform: translateY(-100%); opacity: 0; }

      .content-area { left: 8px; right: 8px; bottom: 8px; max-height: 52%; padding-bottom: 10px; overflow-y: auto; }
      .content-area.hidden-ui { transform: translateY(100%); opacity: 0; }
      .section-title { font-size: 0.9rem; margin: 10px 0 3px 0; }

      .scroll-row { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 6px; gap: 10px; }

      .channel-card { width: 115px; height: 75px; padding: 6px; border-radius: 8px; }
      .channel-card img { height: 60%; max-width: 95%; object-fit: contain !important; margin-bottom: 2px; filter: none !important; }
      .channel-card span { font-size: 9px; display: block !important; }

      .poster-card { width: 75px; border-radius: 8px; }
      .poster-card img { border-radius: 6px; filter: none !important; }
      .poster-card span { font-size: 8px; padding: 2px; display: block !important; }

      .ver-todo-card { width: 75px; border-radius: 8px; }
      .ver-todo-card span { font-size: 9px; }

      .category-item { font-size: 0.8rem; padding: 5px 12px; margin-right: 6px; border-width: 2px; }
      .channel-logo { top: 65px; right: 15px; max-width: 75px; max-height: 40px; }

      /* === BOTÓN PWA EN MÓVIL === */
      #pwaInstallButton {
        top: 10px;
        right: 70px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>

<div class="player-container"><video id="videoPlayer" autoplay playsinline crossorigin="anonymous"></video></div>

<div id="audioVisualLayer" class="audio-visual-layer">
  <img id="audioBackgroundImg" src="" alt="Audio Player Cover">
</div>

<!-- === CONTENEDOR DE CHROMECAST (VISIBLE EN TODOS LADOS) === -->
<div class="cast-container" id="castContainer" style="display: block !important;">
  <google-cast-launcher id="castButton"></google-cast-launcher>
</div>

<!-- === BOTÓN DE INSTALACIÓN PWA (SOLO APARECE EN WEB) === -->
<div id="pwaInstallButton">
  <img src="https://cdn-icons-png.flaticon.com/512/2965/2965167.png" alt="Instalar">
  <span>Instalar</span>
</div>

<div class="barra-alias-tv" id="barraAlias">
  <div class="titulo-alias">APOYA A MAX CON TU DONACIÓN</div>
  <div class="contenedor-banco">
    <img src="https://tinyurl.com/Mrcaado" alt="MP">
    <p class="texto-alias">claudio.2661</p>
  </div>
  <div class="contenedor-banco">
    <img src="https://tinyurl.com/Pr3eex" alt="Prex">
    <p class="texto-alias">klaudio.2661</p>
  </div>
</div>

<div class="side-menu" id="sideMenu">
  <div class="menu-icon" data-type="home" tabindex="0"><img src="https://tinyurl.com/IconodeTV" alt="INICIO"></div>
  <div class="menu-icon" data-type="movies" tabindex="0"><img src="https://cdn.phototourl.com/free/2026-05-23-5203ab51-2efc-4fd1-997e-d8780cde8cf6.png" alt="PELICULAS"></div>
  <div class="menu-icon" data-type="series" tabindex="0"><img src="https://cdn.phototourl.com/free/2026-05-23-c4871927-60d8-4b85-9cfc-fa3738c41675.png" alt="SERIES"></div>
  <div class="menu-icon" data-type="kids" tabindex="0"><img src="https://cdn.phototourl.com/free/2026-05-23-8aa8534b-4de3-45fc-8dfd-f6edc4b249f3.png" alt="KIDS"></div>
</div>

<div id="contentArea" class="content-area"></div>
<div class="loading" id="loadingMsg">Cargando...</div>

<script>
  // === BOTÓN DE INSTALACIÓN PWA ===
  let pwaInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    pwaInstallPrompt = e;
    document.getElementById('pwaInstallButton').style.display = 'block';
  });

  document.getElementById('pwaInstallButton').addEventListener('click', () => {
    if (pwaInstallPrompt) {
      pwaInstallPrompt.prompt();
      pwaInstallPrompt.userChoice.then((choiceResult) => {
        if (choiceResult.outcome === 'accepted') {
          document.getElementById('pwaInstallButton').style.display = 'none';
        }
        pwaInstallPrompt = null;
      });
    }
  });

  document.addEventListener('DOMContentLoaded', function() {
    window.TV_URL = "https://tinyurl.com/2n2etx65";
    window.MOVIES_URL = "https://tinyurl.com/2vz6vphp";
    window.SERIES_URL = "https://tinyurl.com/seriesmgtv";
    window.KIDS_URL = "https://tinyurl.com/peliskids";
    window.logosCanales = { "giatv-208744": "https://tinyurl.com/2uysrbe7", "giatv-208138": "https://tinyurl.com/6tptw4t2", "giatv-209163": "https://tinyurl.com/48xkysmd", "giatv-208817": "https://tinyurl.com/4m768mja", "giatv-209909": "https://tinyurl.com/89bw22fh", "giatv-208730": "https://tinyurl.com/mgtvcomedy" };
    window.tvGroups = {}; window.moviesGroups = {}; window.seriesGroups = {}; window.kidsGroups = {}; window.currentHls = null; window.currentMpegts = null; window.currentMode = "home"; window.uiTimeout = null; window.isUiHidden = false; window.lastPlayedTvUrl = "";

    window.channelCache = {};
    window.currentStreamingUrl = "";

    // === DETECTAR SI ESTAMOS EN PÁGINA WEB (GitHub Pages) ===
    window.isWebMode = window.location.hostname.includes('github.io') ||
                     window.location.hostname.includes('shehub') ||
                     window.location.hostname.includes('localhost') ||
                     window.location.hostname === '' ||
                     window.location.href.includes('file://');

    // === OCULTAR BOTONES DE PELÍCULAS/SERIES/KIDS EN MODO WEB ===
    if (window.isWebMode) {
      var iconsToHide = document.querySelectorAll('.menu-icon[data-type="movies"], .menu-icon[data-type="series"], .menu-icon[data-type="kids"]');
      iconsToHide.forEach(function(icon) {
        icon.style.display = 'none';
      });
    }

    window.SEIS_HORAS_MS = 6 * 60 * 60 * 1000; window.TIEMPO_INACTIVIDAD = 5 * 60 * 1000; window.VISIBLE_CORTO = 60 * 1000; window.VISIBLE_LARGO = 2 * 60 * 1000; window.ESPERA_CORTO = 30 * 60 * 1000; window.ESPERA_LARGO = 60 * 60 * 1000;
    window.tiempoInicioApp = Date.now(); window.temporizadorAlias = null; window.temporizadorVisibilidad = null; window.reproduciendoVideo = false;
    window.video = document.getElementById('videoPlayer'); window.contentArea = document.getElementById('contentArea'); window.sideMenu = document.getElementById('sideMenu'); window.loadingMsg = document.getElementById('loadingMsg'); window.barraAlias = document.getElementById('barraAlias');
    window.audioVisualLayer = document.getElementById('audioVisualLayer'); window.audioBackgroundImg = document.getElementById('audioBackgroundImg');

    window.__onGCastApiAvailable = function(isAvailable) {
      if (isAvailable && window.cast) {
        try {
          var context = cast.framework.CastContext.getInstance();
          context.setOptions({
            receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
            autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
          });

          context.addEventListener(cast.framework.CastContextEventType.SESSION_STATE_CHANGED, function(event) {
            if (event.sessionState === cast.framework.SessionState.SESSION_STARTED || event.sessionState === cast.framework.SessionState.SESSION_RESUMED) {
              if (window.currentStreamingUrl) {
                enviarUrlAChromecast(window.currentStreamingUrl);
              }
            }
          });
        } catch(e) { console.log("Error CastContext:", e); }
      }
    };

    // === SOLO MODIFIQUÉ ESTA FUNCIÓN PARA ARREGLAR LOS CANALES CON NÚMEROS Y "GIA" ===
    function enviarUrlAChromecast(url) {
      if (window.cast && cast.framework) {
        var context = cast.framework.CastContext.getInstance();
        var currentSession = context.getCurrentSession();
        if (currentSession) {
          var urlDecodificada = decodeURIComponent(url).toLowerCase();

          // Detección inteligente de tipo de contenido
          var contentType;
          if (urlDecodificada.includes('.m3u') ||
              urlDecodificada.includes('gia') ||
              urlDecodificada.includes(':8080/') ||
              urlDecodificada.includes(':25461/') ||
              urlDecodificada.includes('/stream/')) {
            contentType = 'application/x-mpegURL'; // Fuerza M3U8 para streams de TV
          } else if (urlDecodificada.includes('.ts')) {
            contentType = 'video/mp2t';
          } else if (urlDecodificada.includes('.mp3')) {
            contentType = 'audio/mp3';
          } else {
            var ext = urlDecodificada.split('?')[0].split('.').pop();
            if (ext === 'm3u8' || ext === 'm3u') {
              contentType = 'application/x-mpegURL';
            } else if (ext === 'ts') {
              contentType = 'video/mp2t';
            } else if (ext === 'mp3') {
              contentType = 'audio/mp3';
            } else {
              contentType = 'video/mp4';
            }
          }

          var mediaInfo = new chrome.cast.media.MediaInfo(url, contentType);
          mediaInfo.streamType = chrome.cast.media.StreamType.BUFFERED;

          var metadata = new chrome.cast.media.GenericMediaMetadata();
          metadata.title = "MGTV MAX";

          var cached = window.channelCache[url] || window.channelCache[decodeURIComponent(url)];
          if (cached && cached.logo) {
            metadata.images = [new chrome.cast.Image(cached.logo)];
          } else {
            for (var id in window.logosCanales) {
              if (url.includes(id)) {
                metadata.images = [new chrome.cast.Image(window.logosCanales[id])];
                break;
              }
            }
          }

          mediaInfo.metadata = metadata;
          var request = new chrome.cast.media.LoadRequest(mediaInfo);

          currentSession.loadMedia(request).then(function() {
            console.log('Carga Cast exitosa');
          }).catch(function(err) {
            console.log('Error Cast:', err);
          });
          destroyPlayers();
        }
      }
    }

    video.addEventListener('playing', function() { video.classList.add('video-activo'); window.reproduciendoVideo = true; reprogramarTemporizadorAlias(); });
    video.addEventListener('error', desarmarTemporizadorAlias); video.addEventListener('ended', desarmarTemporizadorAlias);

    function dispararMuestraAlias() {
      var transcurrido = Date.now() - window.tiempoInicioApp;
      var esFaseDos = transcurrido > window.SEIS_HORAS_MS;
      window.barraAlias.classList.add('visible');
      window.temporizadorVisibilidad = setTimeout(function() {
        window.barraAlias.classList.remove('visible');
        if (window.reproduciendoVideo) window.temporizadorAlias = setTimeout(dispararMuestraAlias, esFaseDos ? window.ESPERA_LARGO : window.ESPERA_CORTO);
      }, esFaseDos ? window.VISIBLE_LARGO : window.VISIBLE_CORTO);
    }
    function reprogramarTemporizadorAlias() { clearTimeout(window.temporizadorAlias); clearTimeout(window.temporizadorVisibilidad); window.barraAlias.classList.remove('visible'); if (!window.reproduciendoVideo) return; window.temporizadorAlias = setTimeout(dispararMuestraAlias, window.TIEMPO_INACTIVIDAD); }
    function desarmarTemporizadorAlias() { clearTimeout(window.temporizadorAlias); clearTimeout(window.temporizadorVisibilidad); window.barraAlias.classList.remove('visible'); }
    function presionoBotonMando() { if (window.barraAlias.classList.contains('visible')) window.barraAlias.classList.remove('visible'); if (window.reproduciendoVideo) reprogramarTemporizadorAlias(); }
    function showLoading(show) { window.loadingMsg.style.display = show ? 'flex' : 'none'; }

    function destroyPlayers() {
      if (window.audioVisualLayer) window.audioVisualLayer.style.display = 'none';
      video.classList.remove('video-activo'); desarmarTemporizadorAlias(); window.reproduciendoVideo = false;
      if (window.currentHls) { window.currentHls.destroy(); window.currentHls = null; }
      if (window.currentMpegts) { window.currentMpegts.destroy(); window.currentMpegts = null; }
      video.removeAttribute('crossorigin'); video.pause(); video.removeAttribute('src'); video.load();
    }

    function playUrl(url) {
      if (!url) return;
      window.lastPlayedTvUrl = url;
      window.currentStreamingUrl = url;
      mostrarLogo(url);

      if (window.cast && cast.framework) {
        var currentSession = cast.framework.CastContext.getInstance().getCurrentSession();
        if (currentSession) {
          enviarUrlAChromecast(url);
          ocultarInterfazDespuesDeJugar();
          return;
        }
      }

      destroyPlayers();
      var urlDecodificada = decodeURIComponent(url);
      var ext = urlDecodificada.split('?')[0].split('.').pop().toLowerCase();
      var isMpegTs = (ext === 'ts' || url.indexOf(':25461/') !== -1);
      var esContenidoAudio = false;

      var cachedChannel = window.channelCache[url] || window.channelCache[urlDecodificada];
      if (cachedChannel) {
        var nombreLower = cachedChannel.name.toLowerCase();
        var groupLower = cachedChannel.group.toLowerCase();
        if (ext === 'mp3' || groupLower.includes('radio') || groupLower.includes('mp3') || nombreLower.includes('radio') || nombreLower.includes('mp3')) {
          esContenidoAudio = true;
        }
      }

      if (esContenidoAudio) {
        window.audioBackgroundImg.src = (cachedChannel && cachedChannel.logo && cachedChannel.logo.trim() !== "" && cachedChannel.logo.indexOf('127.0.0.1') === -1 && cachedChannel.logo.indexOf('placehold.co') === -1) ? cachedChannel.logo : "https://tinyurl.com/Maximagen";
        window.audioVisualLayer.style.display = 'flex';
        video.removeAttribute('crossorigin'); video.src = url; video.load();
        var playPromise = video.play();
        if (playPromise !== undefined) { playPromise.catch(function() { video.load(); video.play(); }); }
      } else {
        window.audioVisualLayer.style.display = 'none';
        video.setAttribute('crossorigin', 'anonymous');
        if (isMpegTs && window.mpegts && mpegts.isSupported()) {
          try {
            window.currentMpegts = mpegts.createPlayer({ type: 'mpegts', url: url, isLive: true }, { lazyLoad: false, enableStashBuffer: false, liveBufferLatencyChaser: true, stashInitialSize: 32 * 1024 });
            window.currentMpegts.attachMediaElement(video); window.currentMpegts.load(); window.currentMpegts.play();
          } catch(e) { video.src = url; video.play(); }
        } else if (window.Hls && Hls.isSupported()) {
          window.currentHls = new Hls({ enableWorker: true, lowLatencyMode: true, maxBufferLength: 10 });
          window.currentHls.attachMedia(video); window.currentHls.loadSource(url);
          window.currentHls.on(Hls.Events.MANIFEST_PARSED, function() { video.play(); });
          window.currentHls.on(Hls.Events.ERROR, function (event, data) { if (data.fatal) { switch (data.type) { case Hls.ErrorTypes.NETWORK_ERROR: window.currentHls.startLoad(); break; case Hls.ErrorTypes.MEDIA_ERROR: window.currentHls.recoverMediaError(); break; default: destroyPlayers(); video.src = url; video.play(); break; } } });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = url; video.play();
        }
      }
      ocultarInterfazDespuesDeJugar();
    }

    function ocultarInterfazDespuesDeJugar() { clearTimeout(window.uiTimeout); window.uiTimeout = setTimeout(hideUi, 3000); }
    function playUrlExternaNatividad(url) { if (!url) return; destroyPlayers(); hideUi(); window.currentStreamingUrl = url; var urlCod = encodeURI(url.trim()); window.location.href = "intent://" + urlCod.replace(/^https?:\/\//, '') + "#Intent;action=android.intent.action.VIEW;type=" + (urlCod.indexOf('.m3u8') !== -1 ? "application/x-mpegURL" : "video/*") + ";scheme=http;end;"; }
    function mostrarLogo(url) { var old = document.querySelector('.channel-logo'); if (old) old.remove(); for (var id in window.logosCanales) { if (url.includes(id)) { var img = document.createElement('img'); img.className = 'channel-logo'; img.src = window.logosCanales[id] + "?t=" + Date.now(); document.body.appendChild(img); break; } } }

    function fetchM3UGroups(url, isTv, callback) {
      try {
        var xhr = new XMLHttpRequest(); xhr.open("GET", url + "?t=" + Date.now(), true); xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            var groups = {};
            if (xhr.status === 200) {
              var lines = xhr.responseText.split("\n"); var name = "", group = "General", logo = "";
              for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line.indexOf("#EXTINF") === 0) {
                  var n = line.match(/,([^,]+)$/); name = n ? n[1] : "Sin título";
                  var g = line.match(/group-title="([^"]*)"/); group = g ? g[1] : "General";
                  var l = line.match(/tvg-logo="([^"]*)"/); logo = l ? l[1] : "";
                } else if (line.indexOf("http") === 0) {
                  if (name) {
                    var channelObj = { name: name, url: line, logo: (logo && logo !== "http://127.0.0.1/") ? logo : null, group: group };
                    if (!groups[group]) groups[group] = [];
                    groups[group].push(channelObj);
                    if (isTv) { window.channelCache[line] = channelObj; }
                  } name = "";
                }
              }
            } callback(groups);
          }
        }; xhr.send();
      } catch(e) { callback({}); }
    }

    function loadAllData(finalCallback) {
      showLoading(true);
      window.channelCache = {};
      fetchM3UGroups(window.TV_URL, true, function(g1) {
        window.tvGroups = g1;
        fetchM3UGroups(window.MOVIES_URL, false, function(g2) {
          window.moviesGroups = g2;
          fetchM3UGroups(window.SERIES_URL, false, function(g3) {
            window.seriesGroups = g3;
            fetchM3UGroups(window.KIDS_URL, false, function(g4) {
              window.kidsGroups = g4;
              showLoading(false);
              finalCallback();
            });
          });
        });
      });
    }

    function renderHome() {
      window.currentMode = "home"; window.contentArea.innerHTML = ''; var categories = []; for (var k in window.tvGroups) if (window.tvGroups.hasOwnProperty(k)) categories.push(k); if (categories.length === 0) return;
      var featured = window.tvGroups[categories[0]].slice(0, 6);
      if (featured.length) {
        var title = document.createElement('div'); title.className = 'section-title'; title.textContent = 'LO MÁS VISTO AHORA'; window.contentArea.appendChild(title);
        var row = document.createElement('div'); row.className = 'scroll-row';
        featured.forEach(function(ch) {
          var card = document.createElement('div'); card.className = 'channel-card'; card.setAttribute('tabindex', '0'); card.setAttribute('data-url', ch.url);
          var img = document.createElement('img'); var logoUrl = null; for (var id in window.logosCanales) if (ch.url && ch.url.includes(id)) logoUrl = window.logosCanales[id];
          img.src = logoUrl || ch.logo || 'https://placehold.co/200x300/1a1a1a/888?text=No+logo'; card.appendChild(img);
          var span = document.createElement('span'); span.textContent = ch.name; card.appendChild(span);
          card.onclick = function() { playUrl(ch.url); }; row.appendChild(card);
        }); window.contentArea.appendChild(row);
      }
      var catTitle = document.createElement('div'); catTitle.className = 'section-title'; catTitle.textContent = 'CATEGORÍAS'; window.contentArea.appendChild(catTitle);
      var catRow = document.createElement('div'); catRow.className = 'scroll-row';
      categories.forEach(function(cat) {
        var catSpan = document.createElement('span'); catSpan.className = 'category-item'; catSpan.setAttribute('tabindex', '0'); catSpan.textContent = cat;
        catSpan.onclick = function() { showCategoryChannels(cat); }; catRow.appendChild(catSpan);
      }); window.contentArea.appendChild(catRow);
      if (featured.length && !window.lastPlayedTvUrl) playUrl(featured[0].url);
      setTimeout(focusFirstAvailable, 100); resetUiTimeout();
    }

    function showCategoryChannels(categoryName) {
      var channels = window.tvGroups[categoryName] || []; if (!channels.length) return; window.contentArea.innerHTML = '';
      var title = document.createElement('div'); title.className = 'section-title'; title.textContent = categoryName; window.contentArea.appendChild(title);
      var row = document.createElement('div'); row.className = 'scroll-row';
      channels.forEach(function(ch) {
        var card = document.createElement('div'); card.className = 'channel-card'; card.setAttribute('tabindex', '0'); card.setAttribute('data-url', ch.url);
        var img = document.createElement('img'); var logoUrl = null; for (var id in window.logosCanales) if (ch.url && ch.url.includes(id)) logoUrl = window.logosCanales[id];
        img.src = logoUrl || ch.logo || 'https://placehold.co/200x300/1a1a1a/888?text=No+logo'; card.appendChild(img);
        var span = document.createElement('span'); span.textContent = ch.name; card.appendChild(span);
        card.onclick = function() { playUrl(ch.url); }; row.appendChild(card);
      }); window.contentArea.appendChild(row); setTimeout(focusFirstAvailable, 100); resetUiTimeout();
    }

    function renderMoviesOrKids(data, mode) {
      window.currentMode = mode; window.contentArea.innerHTML = '';
      for (var groupName in data) {
        if (!data.hasOwnProperty(groupName)) continue; var items = data[groupName]; if (!items.length) continue;
        var title = document.createElement('div'); title.className = 'section-title'; title.textContent = groupName; window.contentArea.appendChild(title);
        var row = document.createElement('div'); row.className = 'scroll-row';
        items.slice(0, 8).forEach(function(item) {
          var card = document.createElement('div'); card.className = 'poster-card'; card.setAttribute('tabindex', '0');
          var img = document.createElement('img'); img.src = item.logo || 'https://placehold.co/200x300/1a1a1a/888?text=Sin+imagen'; card.appendChild(img);
          card.onclick = function() { playUrlExternaNatividad(item.url); }; row.appendChild(card);
        });
        (function(gName) {
          var verTodo = document.createElement('div'); verTodo.className = 'ver-todo-card'; verTodo.setAttribute('tabindex', '0'); verTodo.innerHTML = '<span>VER TODO</span>';
          verTodo.onclick = function() { showAllItems(data, gName); }; row.appendChild(verTodo);
        })(groupName);
        window.contentArea.appendChild(row);
      }
      window.contentArea.scrollTop = 0; setTimeout(focusFirstAvailable, 100); resetUiTimeout();
    }

    function renderSeries(data) {
      window.currentMode = "series"; window.contentArea.innerHTML = '';
      for (var groupName in data) {
        if (!data.hasOwnProperty(groupName)) continue; var items = data[groupName]; if (!items.length) continue;
        var title = document.createElement('div'); title.className = 'section-title'; title.textContent = groupName; window.contentArea.appendChild(title);
        var row = document.createElement('div'); row.className = 'scroll-row';
        items.slice(0, 8).forEach(function(item) {
          var card = document.createElement('div'); card.className = 'poster-card'; card.setAttribute('tabindex', '0');
          var img = document.createElement('img'); img.src = item.logo || 'https://placehold.co/200x300/1a1a1a/888?text=Sin+imagen'; card.appendChild(img);
          var span = document.createElement('span'); span.textContent = item.name; card.appendChild(span);
          card.onclick = function() { playUrlExternaNatividad(item.url); }; row.appendChild(card);
        });
        (function(gName) {
          var verTodo = document.createElement('div'); verTodo.className = 'ver-todo-card'; verTodo.setAttribute('tabindex', '0'); verTodo.innerHTML = '<span>VER TODO</span>';
          verTodo.onclick = function() { showAllItems(data, gName); }; row.appendChild(verTodo);
        })(groupName);
        window.contentArea.appendChild(row);
      }
      window.contentArea.scrollTop = 0; setTimeout(focusFirstAvailable, 100); resetUiTimeout();
    }

    function showAllItems(data, groupName) {
      var items = data[groupName] || []; if (!items.length) return; window.contentArea.innerHTML = '';
      var title = document.createElement('div'); title.className = 'section-title'; title.textContent = groupName + " (Todas)"; window.contentArea.appendChild(title);
      var row = document.createElement('div'); row.className = 'scroll-row';
      items.forEach(function(item) {
        var card = document.createElement('div'); card.className = 'poster-card'; card.setAttribute('tabindex', '0');
        var img = document.createElement('img'); img.src = item.logo || 'https://placehold.co/200x300/1a1a1a/888?text=Sin+imagen'; card.appendChild(img);
        if (window.currentMode === 'series') { var span = document.createElement('span'); span.textContent = item.name; card.appendChild(span); }
        card.onclick = function() { playUrlExternaNatividad(item.url); }; row.appendChild(card);
      }); window.contentArea.appendChild(row); window.contentArea.scrollTop = 0; setTimeout(focusFirstAvailable, 100); resetUiTimeout();
    }

    function focusFirstAvailable() {
      if (window.currentMode === 'home' && window.lastPlayedTvUrl) {
        var targetCard = window.contentArea.querySelector('[data-url="' + window.lastPlayedTvUrl + '"]');
        if (targetCard) { targetCard.focus(); var parentRow = targetCard.closest('.scroll-row'); if (parentRow) ensureScrollVisible(parentRow, targetCard); return; }
      }
      var mainItems = window.contentArea.querySelectorAll('[tabindex="0"]');
      if (mainItems.length > 0) mainItems[0].focus();
      else { var firstMenu = document.querySelector('.menu-icon'); if(firstMenu) firstMenu.focus(); }
    }

    function showUi() {
      window.isUiHidden = false;
      window.sideMenu.classList.remove('hidden-ui');
      window.contentArea.classList.remove('hidden-ui');
      var castCont = document.getElementById('castContainer');
      if (castCont && window.innerWidth <= 768) { castCont.style.opacity = "1"; }
      resetUiTimeout();
    }
    function hideUi() {
      window.isUiHidden = true;
      window.sideMenu.classList.add('hidden-ui');
      window.contentArea.classList.add('hidden-ui');
      var castCont = document.getElementById('castContainer');
      if (castCont) { castCont.style.opacity = "0"; }
      if (document.activeElement) document.activeElement.blur();
    }
    function resetUiTimeout() { clearTimeout(window.uiTimeout); window.uiTimeout = setTimeout(hideUi, 5000); }

    function handleKeydown(e) {
      presionoBotonMando();
      if (window.isUiHidden) { e.preventDefault(); showUi(); focusFirstAvailable(); return; }
      resetUiTimeout();
      var active = document.activeElement; if (!active) return;
      var inSideMenu = active.classList.contains('menu-icon');
      var menuItems = Array.prototype.slice.call(window.sideMenu.querySelectorAll('.menu-icon'));
      var rows = Array.prototype.slice.call(window.contentArea.querySelectorAll('.scroll-row'));
      var currentCtxItems = [], currentRowIdx = -1, currentItemIdx = -1;

      if (!inSideMenu) {
        rows.forEach(function(row, rIdx) {
          var items = Array.prototype.slice.call(row.querySelectorAll('[tabindex="0"]'));
          var iIdx = items.indexOf(active); if (iIdx !== -1) { currentRowIdx = rIdx; currentItemIdx = iIdx; currentCtxItems = items; }
        });
      }

      switch (e.key) {
        case 'ArrowLeft':
          e.preventDefault();
          if (!inSideMenu) {
            if (currentItemIdx > 0) {
              currentCtxItems[currentItemIdx - 1].focus(); ensureScrollVisible(rows[currentRowIdx], currentCtxItems[currentItemIdx - 1]);
            } else { menuItems[0].focus(); }
          }
          break;
        case 'ArrowRight':
          e.preventDefault();
          if (inSideMenu) { focusFirstAvailable(); }
          else if (currentItemIdx < currentCtxItems.length - 1) {
            currentCtxItems[currentItemIdx + 1].focus(); ensureScrollVisible(rows[currentRowIdx], currentCtxItems[currentItemIdx + 1]);
          }
          break;
        case 'ArrowUp':
          e.preventDefault();
          if (inSideMenu) {
            var mIdx = menuItems.indexOf(active); if (mIdx > 0) menuItems[mIdx - 1].focus();
          } else if (currentRowIdx > 0) {
            var targetRowItems = Array.prototype.slice.call(rows[currentRowIdx - 1].querySelectorAll('[tabindex="0"]'));
            var targetIdx = Math.min(currentItemIdx, targetRowItems.length - 1);
            if (targetRowItems[targetIdx]) {
              targetRowItems[targetIdx].focus(); ensureVerticalScrollVisible(targetRowItems[targetIdx]); ensureScrollVisible(rows[currentRowIdx - 1], targetRowItems[targetIdx]);
            }
          }
          break;
        case 'ArrowDown':
          e.preventDefault();
          if (inSideMenu) {
            var mIdx = menuItems.indexOf(active); if (mIdx < menuItems.length - 1) menuItems[mIdx + 1].focus();
          } else if (currentRowIdx < rows.length - 1) {
            var targetRowItems = Array.prototype.slice.call(rows[currentRowIdx + 1].querySelectorAll('[tabindex="0"]'));
            var targetIdx = Math.min(currentItemIdx, targetRowItems.length - 1);
            if (targetRowItems[targetIdx]) {
              targetRowItems[targetIdx].focus(); ensureVerticalScrollVisible(targetRowItems[targetIdx]); ensureScrollVisible(rows[currentRowIdx + 1], targetRowItems[targetIdx]);
            }
          }
          break;
        case 'Enter': e.preventDefault(); active.click(); break;
        case 'Escape': case 'Back': case 'GoBack':
          e.preventDefault(); if (window.currentMode !== 'home') renderHome(); else hideUi(); break;
      }
    }

    function ensureScrollVisible(row, element) {
      var rowBounds = row.getBoundingClientRect(); var elBounds = element.getBoundingClientRect();
      if (elBounds.right > rowBounds.right) row.scrollLeft += (elBounds.right - rowBounds.right) + 40;
      else if (elBounds.left < rowBounds.left) row.scrollLeft -= (rowBounds.left - elBounds.left) + 40;
    }

    function ensureVerticalScrollVisible(element) {
      var containerBounds = window.contentArea.getBoundingClientRect();
      var elBounds = element.getBoundingClientRect();
      if (elBounds.bottom > containerBounds.bottom) { window.contentArea.scrollTop += (elBounds.bottom - containerBounds.bottom) + 30; }
      else if (elBounds.top < containerBounds.top) { window.contentArea.scrollTop -= (containerBounds.top - elBounds.top) + 30; }
    }

    video.addEventListener('click', function() { if (window.isUiHidden) { showUi(); focusFirstAvailable(); } else hideUi(); });
    window.audioVisualLayer.addEventListener('click', function() { if (window.isUiHidden) { showUi(); focusFirstAvailable(); } else hideUi(); });
    document.addEventListener('keydown', handleKeydown); document.addEventListener('click', presionoBotonMando);

    function init() {
      var icons = window.sideMenu.querySelectorAll('.menu-icon');
      for (var i = 0; i < icons.length; i++) {
        icons[i].addEventListener('click', function() {
          var type = this.getAttribute('data-type');
          window.contentArea.innerHTML = '';
          if (type === 'home') {
            renderHome();
          }
          else if (type === 'movies') {
            window.lastPlayedTvUrl = "";
            renderMoviesOrKids(window.moviesGroups, "movies");
          }
          else if (type === 'series') {
            window.lastPlayedTvUrl = "";
            renderSeries(window.seriesGroups);
          }
          else if (type === 'kids') {
            window.lastPlayedTvUrl = "";
            renderMoviesOrKids(window.kidsGroups, "kids");
          }
        });
      }
      renderHome();
    }
    loadAllData(init);
  });
</script>
</body>
</html>
