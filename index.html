<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KlauTV - VLC Rápido</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    /* Barra de herramientas superior */
    .toolbar {
      display: flex;
      gap: 15px;
      justify-content: flex-end;
      margin-bottom: 20px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    .tool-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.1s;
    }
    .tool-btn:hover {
      background: #ffcc88;
      color: #000;
    }
    /* Contenedor principal */
    .app {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    /* Paneles laterales */
    .left-panel, .right-panel {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 20px 12px;
      height: calc(100vh - 100px);
      overflow-y: auto;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
    }
    .left-panel {
      flex: 0 0 260px;
    }
    .right-panel {
      flex: 0 0 320px;
    }
    .left-panel.oculto, .right-panel.oculto {
      flex: 0 0 0;
      padding: 0;
      overflow: hidden;
      border: none;
    }
    /* Área central */
    .center-panel {
      flex: 1;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .player-container {
      background: #000;
      border-radius: 24px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    video::-webkit-media-controls {
      display: none !important;
    }
    .video-controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
    }
    .vid-btn {
      background: #2a2a35;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
    }
    .fav-bar {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 10px 15px;
      border-radius: 40px;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .fav-chip {
      background: #2a2a35;
      padding: 6px 16px;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .fav-chip:hover {
      background: #4a4a55;
    }
    /* Estilos de menús */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .menu-btn, .cat-btn, .channel-menu-btn {
      background: rgba(30,30,40,0.8);
      border: none;
      color: #ccc;
      font-size: 1rem;
      padding: 12px 14px;
      border-radius: 14px;
      text-align: left;
      cursor: pointer;
      width: 100%;
    }
    .menu-btn:hover, .cat-btn:hover, .channel-menu-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #ffdd99;
    }
    .back-btn {
      background: rgba(50,50,60,0.9);
      color: #ffdd99;
      margin-bottom: 12px;
    }
    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(25,25,35,0.7);
      margin-bottom: 8px;
      padding: 10px 12px;
      border-radius: 14px;
      cursor: pointer;
    }
    .channel-item:hover {
      background: rgba(255,255,255,0.1);
    }
    .channel-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      border-radius: 8px;
    }
    .channel-name {
      flex: 1;
      font-size: 0.85rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fav-star {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.2rem;
      cursor: pointer;
      width: 28px;
    }
    .fav-star.active {
      color: #ffcc88;
    }
    .vlc-link {
      background: none;
      border: none;
      color: #88ccff;
      font-size: 1rem;
      cursor: pointer;
      margin-left: 8px;
    }
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #1e1e2a;
    }
    ::-webkit-scrollbar-thumb {
      background: #ffcc88;
      border-radius: 10px;
    }
    .empty-msg {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
    }
    @media (max-width: 900px) {
      body { padding: 10px; }
      .left-panel, .right-panel { flex-basis: 100%; height: auto; max-height: 40vh; }
    }
  </style>
</head>
<body>
<div class="toolbar">
  <button class="tool-btn" id="toggleLeftBtn">◀ Ocultar menú</button>
  <button class="tool-btn" id="toggleRightBtn">Ocultar canales ▶</button>
  <button class="tool-btn" id="fullscreenBtn">⛶ Pantalla completa</button>
</div>
<div class="app">
  <div class="left-panel" id="leftPanel">
    <div class="logo" style="text-align:center; margin-bottom:20px;">
      <img src="https://cdn.phototourl.com/free/2026-04-21-4a8d26b0-4efb-4851-b8b9-016c8c390024.png" alt="KlauTV" style="width:100px;">
    </div>
    <div id="menuContainer" class="menu-list"></div>
  </div>
  <div class="center-panel">
    <div class="player-container">
      <video id="videoPlayer" autoplay playsinline poster=""></video>
    </div>
    <div class="video-controls">
      <button class="vid-btn" id="openInVlcBtn">📺 Abrir actual en VLC</button>
    </div>
    <div class="fav-bar" id="favBar"></div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
  // ==================== CONFIGURACIÓN ====================
  const M3U_URL = "https://tinyurl.com/2n2etx65";
  let categorias = {};
  let favoritos = JSON.parse(localStorage.getItem("klautv_favs")) || [];
  let nivel = "principal";
  let canalesActuales = [];
  let currentHls = null, currentMpegts = null;
  let fullscreenActive = false;
  let doubleClickTimer = null;

  // DOM
  const menuContainer = document.getElementById("menuContainer");
  const rightPanel = document.getElementById("rightPanel");
  const leftPanel = document.getElementById("leftPanel");
  const video = document.getElementById("videoPlayer");
  const favBar = document.getElementById("favBar");
  const toggleLeftBtn = document.getElementById("toggleLeftBtn");
  const toggleRightBtn = document.getElementById("toggleRightBtn");
  const fullscreenBtn = document.getElementById("fullscreenBtn");
  const openInVlcBtn = document.getElementById("openInVlcBtn");

  // ========== FUNCIÓN MEJORADA PARA ABRIR EN VLC ==========
  function openInVLC(url) {
    // Crear un Intent URI que apunta directamente a la actividad de reproducción de VLC
    const intentUri = `intent://${url.replace(/^https?:\/\//, '')}#Intent;action=android.intent.action.VIEW;package=org.videolan.vlc;component=org.videolan.vlc/org.videolan.vlc.gui.video.VideoPlayerActivity;end`;
    window.location.href = intentUri;
  }

  // ========== REPRODUCCIÓN ==========
  function destroyPlayers() {
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    if (currentMpegts) { currentMpegts.destroy(); currentMpegts = null; }
  }
  function playUrl(url) {
    if (/\.(mkv|avi|mov|wmv|flv|webm)$/i.test(url)) {
      openInVLC(url);
      return;
    }
    destroyPlayers();
    video.pause();
    video.style.background = "#000";
    if (url.includes('.m3u8')) {
      if (Hls && Hls.isSupported()) {
        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.log));
      } else {
        video.src = url;
        video.play().catch(e=>console.log);
      }
    } else if (url.includes('.ts') || url.includes(':25461/')) {
      if (window.mpegts && mpegts.isSupported()) {
        currentMpegts = mpegts.createPlayer({ type: 'mpegts', url: url, isLive: true });
        currentMpegts.attachMediaElement(video);
        currentMpegts.load();
        currentMpegts.play().catch(e=>console.log);
      } else {
        video.src = url;
        video.play().catch(e=>console.log);
      }
    } else {
      video.src = url;
      video.play().catch(e=>console.log);
    }
  }

  // ========== FAVORITOS ==========
  function saveFavs() {
    localStorage.setItem("klautv_favs", JSON.stringify(favoritos));
    renderFavBar();
    if (nivel === "canales") renderRightPanel();
  }
  function toggleFav(canal) {
    const exists = favoritos.some(f => f.url === canal.url);
    if (exists) favoritos = favoritos.filter(f => f.url !== canal.url);
    else favoritos.push(canal);
    saveFavs();
  }
  function renderFavBar() {
    favBar.innerHTML = "";
    if (favoritos.length === 0) {
      favBar.innerHTML = "<span style='opacity:0.6;'>⭐ Favoritos vacíos</span>";
      return;
    }
    favoritos.forEach(fav => {
      const chip = document.createElement("div");
      chip.className = "fav-chip";
      chip.onclick = () => playUrl(fav.url);
      if (fav.logo) {
        const img = document.createElement("img");
        img.src = fav.logo;
        chip.appendChild(img);
      } else {
        chip.innerHTML += "⭐ ";
      }
      chip.appendChild(document.createTextNode(fav.nombre));
      favBar.appendChild(chip);
    });
  }

  // ========== RENDER DE INTERFAZ ==========
  function renderPrincipal() {
    nivel = "principal";
    menuContainer.innerHTML = "";
    const opciones = ["TV", "PELÍCULAS", "SERIES", "KIDS"];
    opciones.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.innerText = opt;
      btn.onclick = () => {
        if (opt === "TV") {
          if (Object.keys(categorias).length) renderCategorias();
          else mostrarError("Cargando...", false);
        } else {
          mostrarMensaje("Próximamente");
        }
      };
      menuContainer.appendChild(btn);
    });
  }

  function renderCategorias() {
    nivel = "categorias";
    const cats = Object.keys(categorias).filter(c => c !== "Otros" && c.trim());
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "menu-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderPrincipal();
    menuContainer.appendChild(backBtn);
    if (!cats.length) {
      const msg = document.createElement("div");
      msg.className = "empty-msg";
      msg.innerText = "No hay categorías";
      menuContainer.appendChild(msg);
      return;
    }
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.innerText = cat;
      btn.onclick = () => {
        canalesActuales = categorias[cat] || [];
        nivel = "canales";
        renderRightPanel();
        renderCanalesEnMenu();
        if (canalesActuales.length) playUrl(canalesActuales[0].url);
      };
      menuContainer.appendChild(btn);
    });
  }

  function renderCanalesEnMenu() {
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "menu-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderCategorias();
    menuContainer.appendChild(backBtn);
    canalesActuales.forEach(canal => {
      const btn = document.createElement("button");
      btn.className = "channel-menu-btn";
      if (canal.logo) {
        const img = document.createElement("img");
        img.src = canal.logo;
        img.style.width = "28px";
        img.style.height = "28px";
        img.style.marginRight = "8px";
        btn.appendChild(img);
      }
      const span = document.createElement("span");
      span.innerText = canal.nombre;
      btn.appendChild(span);
      btn.onclick = () => playUrl(canal.url);
      menuContainer.appendChild(btn);
    });
  }

  function renderRightPanel() {
    rightPanel.innerHTML = "";
    if (!canalesActuales.length) {
      rightPanel.innerHTML = "<div class='empty-msg'>Selecciona una categoría</div>";
      return;
    }
    canalesActuales.forEach(canal => {
      const item = document.createElement("div");
      item.className = "channel-item";
      if (canal.logo) {
        const img = document.createElement("img");
        img.className = "channel-logo";
        img.src = canal.logo;
        img.onerror = () => img.style.display = "none";
        item.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.style.width = "40px";
        placeholder.style.height = "40px";
        placeholder.style.background = "#222";
        placeholder.style.borderRadius = "8px";
        item.appendChild(placeholder);
      }
      const nameSpan = document.createElement("span");
      nameSpan.className = "channel-name";
      nameSpan.innerText = canal.nombre;
      item.appendChild(nameSpan);
      const favBtn = document.createElement("button");
      favBtn.className = "fav-star";
      favBtn.innerText = favoritos.some(f => f.url === canal.url) ? "★" : "☆";
      if (favoritos.some(f => f.url === canal.url)) favBtn.classList.add("active");
      favBtn.onclick = (e) => {
        e.stopPropagation();
        toggleFav(canal);
      };
      item.appendChild(favBtn);
      // Botón para abrir en VLC directamente
      const vlcBtn = document.createElement("button");
      vlcBtn.className = "vlc-link";
      vlcBtn.innerHTML = "📺 VLC";
      vlcBtn.title = "Abrir en VLC";
      vlcBtn.onclick = (e) => {
        e.stopPropagation();
        openInVLC(canal.url);
      };
      item.appendChild(vlcBtn);
      item.onclick = () => playUrl(canal.url);
      rightPanel.appendChild(item);
    });
  }

  function mostrarError(msg, recargar = true) {
    menuContainer.innerHTML = `<div class="empty-msg">${msg}</div>`;
    if (recargar) {
      const retry = document.createElement("button");
      retry.className = "menu-btn";
      retry.innerText = "Reintentar";
      retry.onclick = () => cargarLista();
      menuContainer.appendChild(retry);
    }
  }
  function mostrarMensaje(msg) {
    const div = document.createElement("div");
    div.style.position = "fixed";
    div.style.bottom = "20px";
    div.style.left = "50%";
    div.style.transform = "translateX(-50%)";
    div.style.background = "#222";
    div.style.padding = "8px 20px";
    div.style.borderRadius = "30px";
    div.style.zIndex = "1000";
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 2000);
  }

  // ========== CARGA DE LISTA M3U ==========
  function cargarLista() {
    menuContainer.innerHTML = "<div class='empty-msg'>Cargando canales...</div>";
    fetch(M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(data => {
        categorias = {};
        const lines = data.split("\n");
        let currentName = "", currentGroup = "Otros", currentLogo = null;
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1] : "Canal";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Otros";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : null;
          } else if (line.startsWith("http")) {
            const canal = { nombre: currentName, url: line, logo: currentLogo };
            if (!categorias[currentGroup]) categorias[currentGroup] = [];
            categorias[currentGroup].push(canal);
          }
        }
        if (Object.keys(categorias).length === 0) throw new Error("No canales");
        renderPrincipal();
        renderFavBar();
        const primeras = Object.keys(categorias);
        if (primeras.length) {
          const primeraCat = primeras[0];
          canalesActuales = categorias[primeraCat] || [];
          renderRightPanel();
          if (canalesActuales.length) playUrl(canalesActuales[0].url);
        }
      })
      .catch(err => {
        console.error(err);
        categorias = {
          "CINE PREMIUM": [
            { nombre: "Demo 1", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null },
            { nombre: "Demo 2", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_2mb.mp4", logo: null }
          ],
          "ARGENTINA": [
            { nombre: "Canal Arg", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null }
          ]
        };
        renderPrincipal();
        renderFavBar();
        const primeras = Object.keys(categorias);
        if (primeras.length) {
          canalesActuales = categorias[primeras[0]];
          renderRightPanel();
          if (canalesActuales.length) playUrl(canalesActuales[0].url);
        }
        mostrarError("Usando canales de ejemplo (sin conexión remota)", false);
      });
  }

  // ========== CONTROL DE PANELES Y FULLSCREEN ==========
  function toggleLeft() {
    leftPanel.classList.toggle("oculto");
    toggleLeftBtn.innerText = leftPanel.classList.contains("oculto") ? "◀ Mostrar menú" : "◀ Ocultar menú";
  }
  function toggleRight() {
    rightPanel.classList.toggle("oculto");
    toggleRightBtn.innerText = rightPanel.classList.contains("oculto") ? "Mostrar canales ▶" : "Ocultar canales ▶";
  }
  function toggleFullscreen() {
    if (!fullscreenActive) {
      document.documentElement.requestFullscreen();
      fullscreenActive = true;
    } else {
      document.exitFullscreen();
      fullscreenActive = false;
    }
  }
  document.addEventListener("fullscreenchange", () => fullscreenActive = !!document.fullscreenElement);
  toggleLeftBtn.onclick = toggleLeft;
  toggleRightBtn.onclick = toggleRight;
  fullscreenBtn.onclick = toggleFullscreen;
  openInVlcBtn.onclick = () => { if (video.src) openInVLC(video.src); };

  // Cambiar canal (anterior/siguiente)
  function cambiarCanal(delta) {
    if (!canalesActuales.length) return;
    let currentUrl = video.src;
    let idx = canalesActuales.findIndex(c => c.url === currentUrl);
    if (idx === -1) idx = 0;
    let newIdx = idx + delta;
    if (newIdx < 0) newIdx = canalesActuales.length - 1;
    if (newIdx >= canalesActuales.length) newIdx = 0;
    playUrl(canalesActuales[newIdx].url);
  }

  // Navegación por teclado
  document.addEventListener("keydown", (e) => {
    const key = e.key;
    if (fullscreenActive) {
      if (key === "ArrowUp") { e.preventDefault(); cambiarCanal(-1); return; }
      if (key === "ArrowDown") { e.preventDefault(); cambiarCanal(1); return; }
    }
    if (!fullscreenActive) {
      if (key === "ArrowLeft") { e.preventDefault(); toggleLeft(); return; }
      if (key === "ArrowRight") { e.preventDefault(); toggleRight(); return; }
    }
    if (key === "Escape" || key === "Backspace") {
      e.preventDefault();
      if (fullscreenActive) toggleFullscreen();
      else {
        if (nivel === "canales") renderCategorias();
        else if (nivel === "categorias") renderPrincipal();
        else if (video.src && !video.paused) { destroyPlayers(); video.pause(); video.src = ""; }
      }
      return;
    }
    if (key === "Enter") {
      if (doubleClickTimer === null) {
        doubleClickTimer = setTimeout(() => {
          doubleClickTimer = null;
          const focused = document.activeElement;
          if (focused && focused.click) focused.click();
        }, 200);
      } else {
        clearTimeout(doubleClickTimer);
        doubleClickTimer = null;
        e.preventDefault();
        toggleFullscreen();
      }
      return;
    }
    if (!fullscreenActive) {
      const focusable = document.querySelectorAll('[tabindex="0"], .menu-btn, .cat-btn, .channel-menu-btn, .channel-item, .fav-chip');
      let current = document.activeElement;
      if (key === "ArrowDown") {
        e.preventDefault();
        let next = null;
        for (let i = 0; i < focusable.length; i++) {
          if (focusable[i] === current && focusable[i+1]) {
            next = focusable[i+1];
            break;
          }
        }
        if (next) next.focus();
        else if (focusable.length) focusable[0].focus();
      }
      if (key === "ArrowUp") {
        e.preventDefault();
        let prev = null;
        for (let i = 0; i < focusable.length; i++) {
          if (focusable[i] === current && i > 0) {
            prev = focusable[i-1];
            break;
          }
        }
        if (prev) prev.focus();
        else if (focusable.length) focusable[focusable.length-1].focus();
      }
    }
  });

  cargarLista();
</script>
</body>
</html>
