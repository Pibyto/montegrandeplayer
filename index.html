<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>KlauTV - Web</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest"></script>
  <script src="https://www.gstatic.com/cvjs/sender/libs/cast_sender.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; outline: none !important; }
    body { background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #eee; min-height: 100vh; padding: 15px; overflow: hidden; }
    .toolbar { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 15px; max-width: 1400px; margin-left: auto; margin-right: auto; }
    .tool-btn { background: rgba(0,0,0,0.6); border: none; color: white; width: 44px; height: 44px; border-radius: 44px; font-size: 1.2rem; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
    .cast-btn { background-image: url('https://tinyurl.com/3sv2wy92'); background-size: 60%; background-repeat: no-repeat; background-position: center; }
    
    .logo-principal {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 120px;
      height: auto;
      z-index: 99999;
      pointer-events: none;
      opacity: 0.7;
    }
    .logo-principal.oculto { display: none; }
    
    .app { display: flex; flex-wrap: wrap; gap: 15px; max-width: 1400px; margin: 0 auto; height: calc(100vh - 30px); }
    .left-panel { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 20px; padding: 15px 12px; height: 100%; overflow-y: auto; flex: 0 0 280px; display: block; }
    .right-panel { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); border-radius: 20px; padding: 15px 12px; height: 100%; overflow-y: auto; flex: 0 0 320px; display: block; }
    .left-panel.oculto, .right-panel.oculto { display: none; }
    .center-panel { flex: 1; min-width: 260px; display: flex; flex-direction: column; gap: 15px; }
    .player-container { background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 16 / 9; width: 100%; box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; display: block; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    video::-webkit-media-controls { display: none !important; }
    .dynamic-area { display: none; width: 100%; height: 100%; flex-direction: column; gap: 10px; }
    .dynamic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 20px; height: 100%; overflow-y: auto; }
    .dynamic-grid.categorias-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    .item-card { background: rgba(20,20,30,0.8); border-radius: 16px; overflow: hidden; cursor: pointer; text-align: center; transition: transform 0.1s; }
    .item-card.poster-card { padding-bottom: 8px; }
    .item-card.text-card { padding: 20px 10px; }
    .item-card.volver-card { background: #ff8800; color: #000; font-weight: bold; border: none; }
    .item-card.volver-card .item-title { color: #000; font-weight: bold; }
    .item-card:focus { background: rgba(60,60,60,0.8); transform: scale(1.02); }
    .item-poster { width: 100%; height: auto; display: block; background: #1a1a2a; }
    .item-title { font-size: 0.8rem; padding: 8px 6px; color: rgba(255,255,255,0.8); text-align: center; line-height: 1.3; }
    .fav-bar { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); padding: 8px 12px; border-radius: 40px; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; }
    .fav-chip { background: rgba(255,255,255,0.1); padding: 5px 14px; border-radius: 30px; font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .menu-list { display: flex; flex-direction: column; gap: 6px; }
    .menu-btn, .cat-btn, .channel-menu-btn { background: rgba(30,30,40,0.6); border: none; color: #ccc; font-size: 0.85rem; padding: 12px 12px; border-radius: 14px; text-align: left; cursor: pointer; width: 100%; }
    .back-btn { background: rgba(50,50,60,0.7); color: #ffdd99; margin-bottom: 10px; }
    .channel-item { display: flex; align-items: center; gap: 12px; background: rgba(25,25,35,0.5); margin-bottom: 8px; padding: 8px 10px; border-radius: 14px; cursor: pointer; }
    .channel-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; }
    .channel-name { flex: 1; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fav-star { background: none; border: none; color: #aaa; font-size: 1rem; cursor: pointer; width: 28px; }
    .fav-star.active { color: #ffcc88; }
    .reproducir-info { background: rgba(0,0,0,0.5); border-radius: 40px; padding: 8px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .reproducir-info span { font-size: 0.75rem; color: rgba(255,255,255,0.7); letter-spacing: 1px; }
    .reproducir-info img { width: 28px; height: 28px; object-fit: contain; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e1e2a; }
    ::-webkit-scrollbar-thumb { background: #ffcc88; border-radius: 10px; }
    .empty-msg { text-align: center; padding: 20px; opacity: 0.6; font-size: 0.8rem; }
    
    .info-clima {
      position: absolute;
      bottom: 8px;
      right: 40px;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: monospace;
      z-index: 99999;
      pointer-events: none;
      font-weight: 600;
    }
    .hora { font-size: 1.4rem; color: rgba(255,255,255,0.92); text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
    .separador { font-size: 1.2rem; color: #3399ff; }
    .clima { display: flex; align-items: center; gap: 4px; font-size: 1.4rem; color: rgba(255,255,255,0.92); }
    
    @media (max-width: 800px) {
      body { padding: 10px; }
      .left-panel, .right-panel { flex-basis: 100%; height: auto; max-height: 40vh; }
      .logo-principal { width: 80px; top: 5px; left: 5px; }
      .info-clima { bottom: 4px; right: 20px; }
      .hora, .clima { font-size: 1rem; }
    }
  </style>
</head>
<body>

<img class="logo-principal" id="logoPrincipal" src="https://tinyurl.com/yrfarar9" alt="ClauTVHD">

<div class="toolbar">
  <button class="tool-btn" id="toggleLeftBtn">☰</button>
  <button class="tool-btn" id="toggleRightBtn">▶</button>
  <button class="tool-btn" id="fullscreenBtn">⛶</button>
  <button class="tool-btn cast-btn" id="castButton"></button>
</div>

<div class="app">
  <div class="left-panel" id="leftPanel">
    <div id="menuContainer" class="menu-list"></div>
  </div>
  <div class="center-panel">
    <div class="player-container" id="playerContainer">
      <video id="videoPlayer" autoplay playsinline poster="" crossorigin="anonymous"></video>
    </div>
    <div id="dynamicArea" class="dynamic-area">
      <div class="reproducir-info">
        <span>REPRODUCIR PELÍCULAS</span>
        <img src="https://cdn.iconscout.com/icon/free/png-256/free-reproductor-vlc-icon-svg-download-png-722651.png?f=webp" alt="VLC">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/MX_Player_Logo.png" alt="MXPlayer">
      </div>
      <div id="dynamicGrid" class="dynamic-grid"></div>
    </div>
    <div class="fav-bar" id="favBar"></div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<script>
  const logoPrincipal = document.getElementById('logoPrincipal');
  const video = document.getElementById('videoPlayer');
  const playerContainer = document.getElementById('playerContainer');
  const dynamicArea = document.getElementById('dynamicArea');
  const dynamicGrid = document.getElementById('dynamicGrid');
  const menuContainer = document.getElementById('menuContainer');
  const rightPanel = document.getElementById('rightPanel');
  const leftPanel = document.getElementById('leftPanel');
  const favBar = document.getElementById('favBar');
  const toggleLeftBtn = document.getElementById('toggleLeftBtn');
  const toggleRightBtn = document.getElementById('toggleRightBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const castButton = document.getElementById('castButton');

  function mostrarLogoPrincipal(mostrar) {
    if (mostrar) logoPrincipal.classList.remove('oculto');
    else logoPrincipal.classList.add('oculto');
  }

  // Función para entrar en fullscreen automático
  function entrarFullscreen() {
    if (!document.fullscreenElement) {
      const elem = playerContainer;
      if (elem.requestFullscreen) elem.requestFullscreen();
      else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
      else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
    }
  }

  // ========== REPRODUCCIÓN CON BLOB (oculta URL) + FULLSCREEN ==========
  async function intentarReproducirPelicula(url) {
    if (!url) return;
    
    // Destruir reproductores de TV
    if (window.currentHls) { window.currentHls.destroy(); window.currentHls = null; }
    if (window.currentMpegts) { window.currentMpegts.destroy(); window.currentMpegts = null; }
    if (window.logoActual) { window.logoActual.remove(); window.logoActual = null; }
    if (window.climaVisible) { 
      const climaDiv = document.getElementById('infoClima');
      if (climaDiv) climaDiv.remove();
      if (window.intervaloReloj) clearInterval(window.intervaloReloj);
      if (window.intervaloClima) clearInterval(window.intervaloClima);
      window.climaVisible = false;
    }
    
    // Mostrar reproductor
    playerContainer.style.display = "block";
    dynamicArea.style.display = "none";
    if (window.modoDynamic) window.modoDynamic = false;
    mostrarLogoPrincipal(false);
    
    const urlLower = url.toLowerCase();
    const esMP4 = urlLower.endsWith('.mp4') || urlLower.includes('.mp4');
    const esMKV = urlLower.endsWith('.mkv') || urlLower.includes('.mkv');
    const esAVI = urlLower.endsWith('.avi') || urlLower.includes('.avi');
    
    if (esMKV || esAVI) {
      // MKV/AVI: abrir con VLC/MXPlayer
      const urlSinProtocolo = url.replace(/^https?:\/\//, '');
      window.location.href = `vlc://${urlSinProtocolo}`;
      setTimeout(() => {
        window.location.href = `intent://${urlSinProtocolo}#Intent;package=com.mxtech.videoplayer.ad;scheme=https;end;`;
      }, 1000);
    } else {
      // MP4: cargar con fetch y blob para ocultar URL
      try {
        // Mostrar mensaje de carga
        let loadingDiv = document.getElementById('cargandoMsg');
        if (!loadingDiv) {
          loadingDiv = document.createElement('div');
          loadingDiv.id = 'cargandoMsg';
          loadingDiv.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#ffcc88; padding:8px 20px; border-radius:30px; z-index:99999; font-size:0.8rem;';
          document.body.appendChild(loadingDiv);
        }
        loadingDiv.style.display = 'block';
        loadingDiv.innerText = '🔄 Cargando película...';
        
        // Descargar el archivo y crear blob
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        
        // Asignar al video
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.src = blobUrl;
        video.muted = true;
        await video.play();
        video.muted = false;
        
        // Entrar en fullscreen automáticamente
        entrarFullscreen();
        
        // Limpiar mensaje
        if (loadingDiv) loadingDiv.style.display = 'none';
        
        // Liberar blob cuando termine
        video.onended = () => URL.revokeObjectURL(blobUrl);
        
      } catch(e) {
        console.error("Error cargando blob:", e);
        let loadingDiv = document.getElementById('cargandoMsg');
        if (loadingDiv) loadingDiv.style.display = 'none';
        // Fallback: intentar directo
        video.pause();
        video.removeAttribute('src');
        video.load();
        video.src = url;
        video.muted = true;
        video.play().then(() => {
          video.muted = false;
          entrarFullscreen();
        }).catch(err => window.open(url, '_blank'));
      }
    }
  }

  // ========== CANALES DE TV (NO TOCADO) ==========
  const logosCanales = [
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208744/tracks-v1a1/mono.m3u8", logo: "https://tinyurl.com/2uysrbe7", top: "20px", right: "50px", widthNormal: "100px", widthFullscreen: "180px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208138/tracks-v1a1/mono.m3u8", logo: "https://tinyurl.com/6tptw4t2", top: "20px", right: "40px", widthNormal: "100px", widthFullscreen: "110px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-209163/playlist.m3u8", logo: "https://tinyurl.com/48xkysmd", top: "20px", right: "40px", widthNormal: "100px", widthFullscreen: "110px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-208817/playlist.m3u8", logo: "https://tinyurl.com/4m768mja", top: "20px", right: "40px", widthNormal: "100px", widthFullscreen: "110px" },
    { url: "https://live20.bozztv.com/giatvplayout7/giatv-209909/playlist.m3u8", logo: "https://tinyurl.com/89bw22fh", top: "20px", right: "40px", widthNormal: "100px", widthFullscreen: "110px" }
  ];

  const canalesConClima = [
    "https://live20.bozztv.com/giatvplayout7/giatv-208744/tracks-v1a1/mono.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-208138/tracks-v1a1/mono.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-209163/playlist.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-208817/playlist.m3u8",
    "https://live20.bozztv.com/giatvplayout7/giatv-209909/playlist.m3u8"
  ];

  let intervaloReloj = null, intervaloClima = null, climaVisible = false;
  let currentHls = null, currentMpegts = null, logoActual = null;

  function actualizarReloj() {
    const ahora = new Date();
    const relojDiv = document.getElementById('relojClima');
    if (relojDiv) relojDiv.textContent = `${ahora.getHours().toString().padStart(2,'0')}:${ahora.getMinutes().toString().padStart(2,'0')}`;
  }

  async function actualizarClima() {
    const climaContenedor = document.getElementById('climaInfo');
    if (!climaContenedor) return;
    try {
      const resp = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-34.8167&longitude=-58.4667&current_weather=true&timezone=auto');
      const datos = await resp.json();
      const temp = Math.round(datos.current_weather.temperature);
      const codigo = datos.current_weather.weathercode;
      let icono = "🌡️";
      if (codigo === 0) icono = "☀️";
      else if (codigo === 1 || codigo === 2) icono = "⛅";
      else if (codigo === 3) icono = "☁️";
      else if (codigo >= 45 && codigo <= 48) icono = "🌫️";
      else if ((codigo >= 51 && codigo <= 67) || (codigo >= 80 && codigo <= 82)) icono = "🌧️";
      else if (codigo >= 71 && codigo <= 77) icono = "❄️";
      else if (codigo >= 95 && codigo <= 99) icono = "⛈️";
      climaContenedor.innerHTML = `${temp}°C ${icono}`;
    } catch(e) { climaContenedor.innerHTML = `--°C 🌡️`; }
  }

  function mostrarHoraYClima(mostrar) {
    if (mostrar && !climaVisible) {
      if (!document.getElementById('infoClima')) {
        const climaDiv = document.createElement('div');
        climaDiv.id = 'infoClima';
        climaDiv.className = 'info-clima';
        climaDiv.innerHTML = `<div class="hora" id="relojClima">--:--</div><div class="separador">|</div><div class="clima" id="climaInfo">--°C 🌡️</div>`;
        playerContainer.appendChild(climaDiv);
        actualizarReloj();
        intervaloReloj = setInterval(actualizarReloj, 60000);
        actualizarClima();
        intervaloClima = setInterval(actualizarClima, 600000);
      }
      climaVisible = true;
    } else if (!mostrar && climaVisible) {
      const climaDiv = document.getElementById('infoClima');
      if (climaDiv) climaDiv.remove();
      if (intervaloReloj) clearInterval(intervaloReloj);
      if (intervaloClima) clearInterval(intervaloClima);
      climaVisible = false;
    }
  }

  function ajustarTamanoLogo() {
    if (!logoActual) return;
    const config = logosCanales.find(c => c.url === window.currentPlayingUrl);
    if (config) logoActual.style.width = document.fullscreenElement ? config.widthFullscreen : config.widthNormal;
  }

  function mostrarLogo(canalUrl) {
    if (logoActual) { logoActual.remove(); logoActual = null; }
    const config = logosCanales.find(c => c.url === canalUrl);
    if (config) {
      const img = document.createElement('img');
      img.src = config.logo;
      img.style.cssText = `position:absolute; top:${config.top}; right:${config.right}; width:${config.widthNormal}; height:auto; z-index:99999; pointer-events:none;`;
      playerContainer.appendChild(img);
      logoActual = img;
      setTimeout(ajustarTamanoLogo, 100);
    }
  }

  function playTv(url) {
    if (!url) return;
    window.currentPlayingUrl = url;
    mostrarLogo(url);
    mostrarLogoPrincipal(false);
    mostrarHoraYClima(canalesConClima.includes(url));
    
    if (currentHls) { currentHls.destroy(); currentHls = null; }
    if (currentMpegts) { currentMpegts.destroy(); currentMpegts = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (url.includes(':25461/') || url.includes('.ts')) {
      if (window.mpegts && mpegts.isSupported()) {
        try {
          currentMpegts = mpegts.createPlayer({ type: 'mpegts', url: url, isLive: true });
          currentMpegts.attachMediaElement(video);
          currentMpegts.load();
          currentMpegts.play().catch(e => console.warn);
        } catch(e) { video.src = url; video.play().catch(e => console.warn); }
      } else { video.src = url; video.play().catch(e => console.warn); }
      return;
    }
    if (url.includes('.m3u8')) {
      if (Hls && Hls.isSupported()) {
        currentHls = new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(video);
        currentHls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e=>console.warn));
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = url; video.play().catch(e=>console.warn); }
      return;
    }
    video.src = url;
    video.play().catch(e => console.warn);
  }

  document.addEventListener('fullscreenchange', ajustarTamanoLogo);

  // ========== DATOS ==========
  const TV_M3U_URL = "https://tinyurl.com/2n2etx65";
  const MOVIES_M3U_URL = "https://tinyurl.com/2vz6vphp";
  const SERIES_M3U_URL = "https://tinyurl.com/seriesmgtv";
  const KIDS_M3U_URL = "https://tinyurl.com/peliskids";
  
  let categoriasTV = {}, todosCanales = [], favoritos = JSON.parse(localStorage.getItem("klautv_favs")) || [];
  let canalesActuales = [], currentChannelIndex = 0;
  let peliculasCategorias = {}, seriesCategorias = {}, kidsCategorias = {};
  let modoDynamic = false, tipoContenido = "peliculas", nivel = "categorias", categoriaActual = "";

  function saveFavs() { localStorage.setItem("klautv_favs", JSON.stringify(favoritos)); renderFavBar(); renderRightPanel(); }
  function toggleFav(canal, e) { e?.stopPropagation(); favoritos.some(f => f.url === canal.url) ? favoritos = favoritos.filter(f => f.url !== canal.url) : favoritos.push(canal); saveFavs(); }
  
  function renderFavBar() {
    favBar.innerHTML = "";
    favoritos.forEach(fav => {
      const chip = document.createElement("div");
      chip.className = "fav-chip";
      chip.onclick = () => { if (modoDynamic) salirModoDynamic(); playTv(fav.url); };
      if (fav.logo) { const img = document.createElement("img"); img.src = fav.logo; img.style.cssText = "width:20px; height:20px;"; chip.appendChild(img); }
      chip.appendChild(document.createTextNode(fav.nombre));
      favBar.appendChild(chip);
    });
  }

  function renderCategorias() {
    dynamicGrid.className = "dynamic-grid categorias-grid";
    dynamicGrid.innerHTML = "";
    let categorias = [];
    if (tipoContenido === "peliculas") categorias = Object.keys(peliculasCategorias).sort();
    else if (tipoContenido === "series") categorias = Object.keys(seriesCategorias).sort();
    else categorias = Object.keys(kidsCategorias).sort();
    
    const volverMenu = document.createElement("div");
    volverMenu.className = "item-card text-card volver-card";
    volverMenu.innerHTML = `<div class="item-title">← VOLVER</div>`;
    volverMenu.onclick = () => salirModoDynamic();
    dynamicGrid.appendChild(volverMenu);
    
    categorias.forEach(cat => {
      const card = document.createElement("div");
      card.className = "item-card text-card";
      card.innerHTML = `<div class="item-title">${cat}</div>`;
      card.onclick = () => { nivel = "items"; categoriaActual = cat; renderItems(); };
      dynamicGrid.appendChild(card);
    });
  }
  
  function renderItems() {
    dynamicGrid.className = "dynamic-grid";
    dynamicGrid.innerHTML = "";
    const volverCard = document.createElement("div");
    volverCard.className = "item-card text-card volver-card";
    volverCard.innerHTML = `<div class="item-title">← VOLVER A CATEGORÍAS</div>`;
    volverCard.onclick = () => { nivel = "categorias"; renderCategorias(); };
    dynamicGrid.appendChild(volverCard);
    
    let items = [];
    if (tipoContenido === "peliculas") items = peliculasCategorias[categoriaActual] || [];
    else if (tipoContenido === "series") items = seriesCategorias[categoriaActual] || [];
    else items = kidsCategorias[categoriaActual] || [];
    
    items.forEach(item => {
      const card = document.createElement("div");
      card.className = "item-card poster-card";
      if (item.logo) {
        const poster = document.createElement("img");
        poster.className = "item-poster";
        poster.src = item.logo;
        poster.onerror = () => poster.src = "https://placehold.co/300x450/1a1a2a/888?text=Sin+Poster";
        card.appendChild(poster);
      }
      const title = document.createElement("div");
      title.className = "item-title";
      title.innerText = item.nombre;
      card.appendChild(title);
      card.onclick = () => intentarReproducirPelicula(item.url);
      dynamicGrid.appendChild(card);
    });
  }

  function salirModoDynamic() {
    modoDynamic = false;
    dynamicArea.style.display = "none";
    playerContainer.style.display = "block";
    leftPanel.classList.remove("oculto");
    rightPanel.classList.remove("oculto");
    mostrarLogoPrincipal(true);
    renderPrincipal();
    if (todosCanales.length > 0) playTv(todosCanales[currentChannelIndex].url);
  }

  function entrarModo(tipo) {
    if (modoDynamic) salirModoDynamic();
    modoDynamic = true;
    tipoContenido = tipo;
    nivel = "categorias";
    playerContainer.style.display = "none";
    dynamicArea.style.display = "flex";
    leftPanel.classList.add("oculto");
    rightPanel.classList.add("oculto");
    mostrarLogoPrincipal(false);
    renderCategorias();
  }

  function cargarM3U(url, storageObj) {
    return fetch(url + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        Object.keys(storageObj).forEach(k => delete storageObj[k]);
        const lines = data.split("\n");
        let currentName = "", currentLogo = "", currentUrl = "", currentGroup = "Sin categoría";
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1].trim() : "Video";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : "";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Sin categoría";
          } else if (line.startsWith("http")) {
            currentUrl = line;
            if (currentName && currentUrl) {
              if (!storageObj[currentGroup]) storageObj[currentGroup] = [];
              storageObj[currentGroup].push({ nombre: currentName, url: currentUrl, logo: currentLogo !== "http://127.0.0.1/" ? currentLogo : null });
            }
            currentName = ""; currentLogo = ""; currentUrl = "";
          }
        }
      }).catch(e => console.error("Error cargando:", e));
  }

  function renderPrincipal() {
    menuContainer.innerHTML = "";
    ["TV", "PELICULAS", "SERIES", "KIDS"].forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.innerText = opt;
      btn.onclick = () => {
        if (opt === "TV") {
          if (modoDynamic) salirModoDynamic();
          if (Object.keys(categoriasTV).length) renderCategoriasTV();
        } else if (opt === "PELICULAS") entrarModo("peliculas");
        else if (opt === "SERIES") entrarModo("series");
        else if (opt === "KIDS") entrarModo("kids");
      };
      menuContainer.appendChild(btn);
    });
    mostrarLogoPrincipal(true);
  }

  function renderCategoriasTV() {
    const cats = Object.keys(categoriasTV).filter(c => c !== "Otros" && c.trim());
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "cat-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderPrincipal();
    menuContainer.appendChild(backBtn);
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-btn";
      btn.innerText = cat;
      btn.onclick = () => {
        canalesActuales = categoriasTV[cat] || [];
        renderCanalesEnMenu();
        if (canalesActuales.length) playTv(canalesActuales[0].url);
      };
      menuContainer.appendChild(btn);
    });
  }

  function renderCanalesEnMenu() {
    menuContainer.innerHTML = "";
    const backBtn = document.createElement("button");
    backBtn.className = "cat-btn back-btn";
    backBtn.innerText = "← Volver";
    backBtn.onclick = () => renderCategoriasTV();
    menuContainer.appendChild(backBtn);
    canalesActuales.forEach(canal => {
      const btn = document.createElement("button");
      btn.className = "channel-menu-btn";
      if (canal.logo) {
        const img = document.createElement("img");
        img.src = canal.logo;
        img.style.cssText = "width:24px; height:24px; margin-right:8px; border-radius:4px;";
        btn.appendChild(img);
      }
      const span = document.createElement("span");
      span.innerText = canal.nombre;
      btn.appendChild(span);
      btn.onclick = () => playTv(canal.url);
      menuContainer.appendChild(btn);
    });
  }

  function renderRightPanel() {
    rightPanel.innerHTML = "";
    if (!todosCanales.length) { rightPanel.innerHTML = "<div class='empty-msg'>Cargando canales...</div>"; return; }
    todosCanales.forEach(canal => {
      const item = document.createElement("div");
      item.className = "channel-item";
      if (canal.logo) {
        const img = document.createElement("img");
        img.className = "channel-logo";
        img.src = canal.logo;
        img.onerror = () => img.style.display = "none";
        item.appendChild(img);
      } else {
        const placeholder = document.createElement("div");
        placeholder.style.cssText = "width:32px; height:32px; background:#222; border-radius:6px;";
        item.appendChild(placeholder);
      }
      const nameSpan = document.createElement("span");
      nameSpan.className = "channel-name";
      nameSpan.innerText = canal.nombre;
      item.appendChild(nameSpan);
      const favBtn = document.createElement("button");
      favBtn.className = "fav-star";
      favBtn.innerText = favoritos.some(f => f.url === canal.url) ? "★" : "☆";
      if (favoritos.some(f => f.url === canal.url)) favBtn.classList.add("active");
      favBtn.onclick = (e) => { e.stopPropagation(); toggleFav(canal, e); };
      item.appendChild(favBtn);
      item.onclick = () => { if (modoDynamic) salirModoDynamic(); playTv(canal.url); };
      rightPanel.appendChild(item);
    });
  }

  function cargarDatos() {
    fetch(TV_M3U_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(r => r.ok ? r.text() : Promise.reject())
      .then(data => {
        categoriasTV = {}; todosCanales = [];
        const lines = data.split("\n");
        let currentName = "", currentGroup = "Otros", currentLogo = null;
        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();
          if (line.startsWith("#EXTINF")) {
            const nameMatch = line.match(/,([^,]+)$/);
            currentName = nameMatch ? nameMatch[1] : "Canal";
            const groupMatch = line.match(/group-title="([^"]*)"/);
            currentGroup = groupMatch ? groupMatch[1] : "Otros";
            const logoMatch = line.match(/tvg-logo="([^"]*)"/);
            currentLogo = logoMatch ? logoMatch[1] : null;
          } else if (line.startsWith("http")) {
            const canal = { nombre: currentName, url: line, logo: currentLogo };
            if (!categoriasTV[currentGroup]) categoriasTV[currentGroup] = [];
            categoriasTV[currentGroup].push(canal);
            todosCanales.push(canal);
          }
        }
        renderPrincipal(); renderFavBar(); renderRightPanel();
        const primeras = Object.keys(categoriasTV);
        if (primeras.length) {
          const primeraCat = primeras[0];
          canalesActuales = categoriasTV[primeraCat] || [];
          if (canalesActuales.length) {
            currentChannelIndex = 0;
            playTv(canalesActuales[0].url);
          }
        }
      }).catch(() => {
        categoriasTV = { "PRINCIPAL": [{ nombre: "Demo", url: "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4", logo: null }] };
        todosCanales = categoriasTV.PRINCIPAL;
        renderPrincipal(); renderFavBar(); renderRightPanel();
      });
    
    cargarM3U(MOVIES_M3U_URL, peliculasCategorias);
    cargarM3U(SERIES_M3U_URL, seriesCategorias);
    cargarM3U(KIDS_M3U_URL, kidsCategorias);
  }
  
  cargarDatos();

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      playerContainer.requestFullscreen?.() || playerContainer.webkitRequestFullscreen?.();
    } else { document.exitFullscreen(); }
  }
  fullscreenBtn.onclick = toggleFullscreen;

  let leftVisible = true, rightVisible = true;
  toggleLeftBtn.onclick = () => { leftVisible = !leftVisible; leftPanel.classList.toggle("oculto", !leftVisible); };
  toggleRightBtn.onclick = () => { rightVisible = !rightVisible; rightPanel.classList.toggle("oculto", !rightVisible); };

  let castContext = null;
  window['__onGCastApiAvailable'] = (loaded) => {
    if (loaded && chrome.cast?.isAvailable) {
      try {
        castContext = cast.framework.CastContext.getInstance();
        castContext.setOptions({ receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID });
      } catch(e) {}
    }
  };
  castButton.onclick = () => castContext?.requestSession();
</script>
</body>
</html>
